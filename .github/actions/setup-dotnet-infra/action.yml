# Composite action: .NET SDK setup with NuGet cache for infra projects
# Installs the .NET SDK version from global.json and restores the NuGet
# package cache keyed on infra/*.csproj files.

name: Setup .NET for Infra
description: Install .NET SDK (from global.json) and cache NuGet packages for infra projects

runs:
  using: composite
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: api/global.json

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-infra-${{ runner.os }}-${{ hashFiles('infra/**/*.csproj') }}
        restore-keys: nuget-infra-${{ runner.os }}-
