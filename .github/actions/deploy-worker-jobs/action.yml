# Updates all Container App Jobs for the worker with a new image.
# Iterates over every worker job (poll, digest, digest-hourly,
# dormant-cleanup) with the naming convention job-tc-{name}-{env-suffix}.
# These names must stay in lockstep with infra/EnvironmentStack.cs —
# Pulumi seeds each job with a quickstart placeholder image on create,
# and CD is responsible for replacing it on every deploy. Missing a job
# here means it silently keeps running the placeholder in prod.
#
# Assumes azure/login has already been called in an earlier step.
name: Deploy Worker Jobs
description: Update all worker Container App Jobs with a new image

inputs:
  env-suffix:
    description: Environment suffix for job names (e.g., dev, prod)
    required: true
  resource-group:
    description: Azure resource group
    required: true
  image:
    description: Full image reference including tag
    required: true

runs:
  using: composite
  steps:
    - name: Deploy worker image to all jobs
      shell: bash
      run: |
        for JOB in poll digest digest-hourly dormant-cleanup; do
          echo "::group::Deploying to job-tc-${JOB}-${{ inputs.env-suffix }}"
          az containerapp job update \
            --name "job-tc-${JOB}-${{ inputs.env-suffix }}" \
            --resource-group "${{ inputs.resource-group }}" \
            --image "${{ inputs.image }}"
          echo "::endgroup::"
        done
