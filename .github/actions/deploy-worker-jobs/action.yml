# Updates the given Container App Jobs for the worker with a new image.
# The caller passes the list of jobs — dev and prod have different
# topologies (ADR 0024: dev has no poll jobs), so this action is
# intentionally agnostic about which jobs exist where.
# Job names follow the convention job-tc-{name}-{env-suffix} and must
# match infra/EnvironmentStack.cs — Pulumi seeds each job with a
# quickstart placeholder image on create, and CD is responsible for
# replacing it on every deploy.
#
# Assumes azure/login has already been called in an earlier step.
name: Deploy Worker Jobs
description: Update the given worker Container App Jobs with a new image

inputs:
  jobs:
    description: Space-separated list of worker job names (without the job-tc- prefix or env suffix)
    required: true
  env-suffix:
    description: Environment suffix for job names (e.g., dev, prod)
    required: true
  resource-group:
    description: Azure resource group
    required: true
  image:
    description: Full image reference including tag
    required: true

runs:
  using: composite
  steps:
    - name: Deploy worker image to all jobs
      shell: bash
      run: |
        for JOB in ${{ inputs.jobs }}; do
          echo "::group::Deploying to job-tc-${JOB}-${{ inputs.env-suffix }}"
          az containerapp job update \
            --name "job-tc-${JOB}-${{ inputs.env-suffix }}" \
            --resource-group "${{ inputs.resource-group }}" \
            --image "${{ inputs.image }}"
          echo "::endgroup::"
        done
