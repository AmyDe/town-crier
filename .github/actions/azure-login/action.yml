# Composite action: Azure OIDC Login
# Wraps azure/login@v2 with the standard OIDC federated credential inputs
# used across all Town Crier deployment workflows.
#
# Required secrets (passed as inputs):
#   client-id       -- AZURE_CLIENT_ID
#   tenant-id       -- AZURE_TENANT_ID
#   subscription-id -- AZURE_SUBSCRIPTION_ID

name: Azure OIDC Login
description: Login to Azure using OIDC federated credentials

inputs:
  client-id:
    description: Azure AD application (client) ID
    required: true
  tenant-id:
    description: Azure AD tenant ID
    required: true
  subscription-id:
    description: Azure subscription ID
    required: true

runs:
  using: composite
  steps:
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}
