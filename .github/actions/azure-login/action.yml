# Composite action: Azure OIDC login
# Wraps azure/login@v2 with the three standard OIDC inputs.
# Eliminates repetition of client-id / tenant-id / subscription-id across jobs.

name: Azure Login (OIDC)
description: Login to Azure using OIDC federated credentials

inputs:
  client-id:
    description: Azure AD application (client) ID
    required: true
  tenant-id:
    description: Azure AD tenant ID
    required: true
  subscription-id:
    description: Azure subscription ID
    required: true

runs:
  using: composite
  steps:
    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}
