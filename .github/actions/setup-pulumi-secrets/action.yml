# Sets Pulumi config secrets required by the infra stack.
# Extracted from cd-dev.yml and cd-prod.yml to eliminate duplication.
#
# Must run after `pulumi stack select` and before `pulumi up`.
# Expects PULUMI_ACCESS_TOKEN to be set in the calling step's environment.
name: Set Pulumi secrets
description: Set Pulumi config secrets for admin API key, pro domains, and Auth0 M2M credentials

inputs:
  admin-api-key:
    description: API key for admin endpoints
    required: true
  auto-grant-pro-domains:
    description: Comma-separated email domains for automatic Pro tier
    required: true
  auth0-m2m-client-id:
    description: Auth0 machine-to-machine client ID
    required: true
  auth0-m2m-client-secret:
    description: Auth0 machine-to-machine client secret
    required: true
  working-directory:
    description: Directory containing the Pulumi project
    required: false
    default: infra

runs:
  using: composite
  steps:
    - name: Set Pulumi config secrets
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pulumi config set --secret adminApiKey "${{ inputs.admin-api-key }}"
        pulumi config set --secret autoGrantProDomains "${{ inputs.auto-grant-pro-domains }}"
        pulumi config set --secret auth0M2mClientId "${{ inputs.auth0-m2m-client-id }}"
        pulumi config set --secret auth0M2mClientSecret "${{ inputs.auth0-m2m-client-secret }}"
