# Monorepo change detection for push, pull_request, merge_group, and tag
# (release) events. Outputs boolean flags for each component category that
# changed.
#
# Modes:
#   push        — compares HEAD~1..HEAD (squash-merge assumed)
#   pr          — compares origin/<base-ref>...HEAD
#   merge_group — compares <base-ref>...HEAD against a raw base SHA (no origin/ prefix)
#   tag         — compares <base-ref>..HEAD, where base-ref is the previous
#                 release tag (computed by the calling workflow). TWO dots,
#                 not three — a direct diff between two refs, matching the
#                 semantics of the hand-rolled guard it replaces
#                 (git diff --quiet "${PREV}..${GITHUB_REF_NAME}"), not the
#                 merge-base-relative three-dot diff used by pr/merge_group
#                 above. If base-ref is empty (no previous tag — first
#                 release), the diff is skipped entirely and every requested
#                 category is forced true, matching the previous guard's
#                 "no PREV -> should-release=true" first-release behavior.
#
#                 tag mode is a release DECISION, not a validation lane, so
#                 it does NOT inherit the uniform .github/ fail-closed
#                 catch-all that push/pr/merge_group apply (see "Coverage
#                 assertion" / DESIGN_EXCEPTIONS below) — an unmapped
#                 .github/ path (not already covered by trigger-files) is
#                 exempted from forcing categories true in tag mode
#                 specifically, so an unrelated CI/workflow tweak landing
#                 between two release tags doesn't force a release. Paths
#                 outside .github/ still fail-closed as normal even in tag
#                 mode. Callers that need a specific .github/ file to force
#                 a release (e.g. changes to the release pipeline itself)
#                 should pass it via trigger-files, as cd-ios-testflight.yml
#                 does for cd-ios-testflight.yml and detect-changes/action.yml.
#
#   Edge case: push mode's HEAD~1 diff assumes every push to the default
#   branch is a single squash-merge commit, so only the last commit is
#   diffed. A fast-forward merge or a multi-commit push would silently
#   miss earlier changes. This is a known, accepted assumption — do not
#   change it silently; see issue #835 for the rationale.
#
# Trigger files:
#   Workflow files (e.g., cd-dev.yml, pr-gate.yml) can force categories
#   to true when they themselves change. Pass trigger-files as a
#   newline-separated list of "file:cat1,cat2" pairs.
#
# Coverage assertion:
#   A second, unconditional step (independent of mode/diff) asserts every
#   top-level path in the checked-out tree is either a mapped category
#   prefix, an ignore-allowlist entry, or a documented design exception —
#   see category-map.sh and the "Coverage assertion" step below. This
#   catches a new top-level directory that nobody wired up, even if it's
#   never touched again after the PR that introduced it (issue #835 slice 2).
name: Detect Changes
description: Monorepo change detection with push/pr modes

inputs:
  mode:
    description: "Detection mode: 'push' (HEAD~1..HEAD), 'pr' (origin/base...HEAD), 'merge_group' (base-sha...HEAD), or 'tag' (base-ref..HEAD, two dots)"
    required: true
  base-ref:
    description: "Base ref for PR mode (e.g., github.base_ref), raw base SHA for merge_group mode, or the previous release tag for tag mode (empty = first release, forces all categories true). Ignored in push mode."
    required: false
    default: ""
  categories:
    description: "Comma-separated list of categories to detect (e.g., go,web,infra,ios,android)"
    required: true
  trigger-files:
    description: |
      Newline-separated list of workflow files that force categories when changed.
      Format: "path:cat1,cat2,..." per line.
      Example:
        .github/workflows/pr-gate.yml:ios,web,infra
        .github/workflows/cd-dev.yml:web,infra
    required: false
    default: ""

outputs:
  cli:
    description: "true if cli/ changed"
    value: ${{ steps.detect.outputs.cli }}
  ios:
    description: "true if mobile/ios/ changed"
    value: ${{ steps.detect.outputs.ios }}
  android:
    description: "true if mobile/android/ changed"
    value: ${{ steps.detect.outputs.android }}
  web:
    description: "true if web/ changed"
    value: ${{ steps.detect.outputs.web }}
  infra:
    description: "true if infra/ changed"
    value: ${{ steps.detect.outputs.infra }}
  go:
    description: "true if api-go/ changed"
    value: ${{ steps.detect.outputs.go }}

runs:
  using: composite
  steps:
    - name: Detect changed paths
      id: detect
      shell: bash
      run: |
        # Category-prefix and ignore-allowlist data lives in category-map.sh
        # (single source of truth — also consumed by the Coverage assertion
        # step below). See that file for the CATEGORY_PREFIXES /
        # IGNORE_ALLOWLIST_* definitions.
        source "${{ github.action_path }}/category-map.sh"

        # Determine changed files based on mode
        FORCE_ALL_TRUE=false
        if [[ "${{ inputs.mode }}" == "push" ]]; then
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
        elif [[ "${{ inputs.mode }}" == "pr" ]]; then
          CHANGED=$(git diff --name-only origin/${{ inputs.base-ref }}...HEAD)
        elif [[ "${{ inputs.mode }}" == "merge_group" ]]; then
          CHANGED=$(git diff --name-only "${{ inputs.base-ref }}...HEAD")
        elif [[ "${{ inputs.mode }}" == "tag" ]]; then
          if [[ -z "${{ inputs.base-ref }}" ]]; then
            # No previous tag (first release) — nothing to diff against.
            # Force every requested category true directly rather than
            # diffing against nothing, matching the pre-existing hand-rolled
            # guard's "no PREV -> should-release=true" first-release behavior.
            CHANGED=""
            FORCE_ALL_TRUE=true
            echo "::notice::tag mode: no base-ref (first release) — forcing all requested categories true"
          else
            # TWO-dot diff — a direct diff between two refs, matching the
            # hand-rolled guard it replaces (git diff --quiet
            # "${PREV}..${GITHUB_REF_NAME}") exactly. Do NOT change to the
            # three-dot merge-base-relative form used by pr/merge_group
            # above — that would silently change which commits get diffed
            # against a divergent history.
            CHANGED=$(git diff --name-only "${{ inputs.base-ref }}..HEAD")
          fi
        else
          echo "::error::Unknown mode '${{ inputs.mode }}'. Use 'push', 'pr', 'merge_group', or 'tag'."
          exit 1
        fi

        echo "Changed files:"
        echo "$CHANGED"

        # Initialise all requested categories to false
        IFS=',' read -ra CATS <<< "${{ inputs.categories }}"
        declare -A flags
        for cat in "${CATS[@]}"; do
          flags["$cat"]=false
        done

        if [[ "$FORCE_ALL_TRUE" == "true" ]]; then
          for cat in "${CATS[@]}"; do
            flags["$cat"]=true
          done
        else

        # Process trigger files — workflow files that force categories
        TRIGGER_FILES="${{ inputs.trigger-files }}"
        declare -A known_trigger_paths
        if [[ -n "$TRIGGER_FILES" ]]; then
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            trigger_path="${line%%:*}"
            trigger_cats="${line#*:}"
            known_trigger_paths["$trigger_path"]=1
            # Fixed-string, whole-line match: a trigger_path must equal one
            # of the newline-separated $CHANGED entries exactly, so a path
            # that merely contains trigger_path as a substring (or where
            # "." would otherwise be read as a regex wildcard) can't
            # false-positive.
            if echo "$CHANGED" | grep -qxF "$trigger_path"; then
              IFS=',' read -ra tcats <<< "$trigger_cats"
              for tc in "${tcats[@]}"; do
                if [[ -v "flags[$tc]" ]]; then
                  flags["$tc"]=true
                fi
              done
            fi
          done <<< "$TRIGGER_FILES"
        fi

        # Map file paths to categories using CATEGORY_PREFIXES /
        # IGNORE_ALLOWLIST_* from category-map.sh (sourced above). Any
        # changed file matching neither a known category prefix nor the
        # ignore-allowlist is treated as an unmapped top-level path and
        # forces every requested category to true — fail-closed, so a new
        # directory gets full lane coverage by default rather than silently
        # zero. Paths already accounted for via the trigger-files mechanism
        # above are exempted from the fail-closed default (they've already
        # forced their specific categories).
        while IFS= read -r file; do
          [[ -z "$file" ]] && continue

          matched_cat=""
          for cat in "${!CATEGORY_PREFIXES[@]}"; do
            prefix="${CATEGORY_PREFIXES[$cat]}"
            if [[ "$file" == "$prefix"/* ]]; then
              matched_cat="$cat"
              break
            fi
          done

          if [[ -n "$matched_cat" ]]; then
            [[ -v "flags[$matched_cat]" ]] && flags[$matched_cat]=true
            continue
          fi

          # Ignore-allowlist: these paths legitimately don't need any
          # pr-gate lane to run.
          allowlisted=false
          for d in "${IGNORE_ALLOWLIST_DIRS[@]}"; do
            if [[ "$file" == "$d"/* ]]; then allowlisted=true; break; fi
          done
          if ! $allowlisted; then
            for f in "${IGNORE_ALLOWLIST_FILES[@]}"; do
              if [[ "$file" == "$f" ]]; then allowlisted=true; break; fi
            done
          fi
          if ! $allowlisted; then
            for g in "${IGNORE_ALLOWLIST_GLOBS[@]}"; do
              # shellcheck disable=SC2053  # intentional unquoted glob match
              if [[ "$file" == $g ]]; then allowlisted=true; break; fi
            done
          fi
          if $allowlisted; then
            continue
          fi

          if [[ -v "known_trigger_paths[$file]" ]]; then
            : # already handled by the trigger-files mechanism above
          elif [[ "${{ inputs.mode }}" == "tag" && "$file" == .github/* ]]; then
            # tag mode is a release DECISION, not a validation lane — unlike
            # push/pr/merge_group (pr-gate.yml, cd-dev.yml), where any
            # unmapped .github/ churn deliberately fail-closes every
            # category (a stray workflow edit could affect any validation
            # lane), here that same blanket rule would force a TestFlight
            # upload on every unrelated CI tweak landing in a release
            # window. Narrow carve-out: .github/ paths NOT already covered
            # by trigger-files are exempted from the fail-closed catch-all
            # in tag mode specifically. Paths outside .github/ still
            # fail-closed below — this carve-out is deliberately scoped to
            # .github/ churn only, not unmapped top-level dirs generally.
            echo "::notice::tag mode: '$file' is under .github/ and not a trigger-file — exempted from the fail-closed catch-all (see cd-ios-testflight.yml's trigger-files input for the paths that DO matter for iOS releases)."
          else
            echo "::warning::Unmapped changed path '$file' matches no known category prefix and no ignore allowlist entry — forcing all requested categories to true (fail-closed)."
            for cat in "${CATS[@]}"; do
              flags["$cat"]=true
            done
          fi
        done <<< "$CHANGED"

        fi # FORCE_ALL_TRUE

        # Write outputs
        for cat in "${CATS[@]}"; do
          echo "${cat}=${flags[$cat]}" >> "$GITHUB_OUTPUT"
        done

        echo "Results: $(for cat in "${CATS[@]}"; do echo -n "${cat}=${flags[$cat]} "; done)"

    # Coverage assertion (issue #835 slice 2). Structural repo check, not
    # incremental: it inspects the actual current top-level directory tree on
    # every invocation, not just this run's changed files. A per-file check
    # (like the step above) only ever sees paths that changed in THIS diff —
    # a dormant unmapped top-level directory added once and never touched
    # again would silently escape detection forever. This step closes that
    # gap by asserting every top-level path in the repo is accounted for.
    - name: Coverage assertion
      shell: bash
      run: |
        source "${{ github.action_path }}/category-map.sh"

        # Design exceptions: top-level entries that are neither a feature
        # category nor a "no lane needed" ignorable, but are intentionally
        # left to the fail-closed catch-all in "Detect changed paths" rather
        # than mapped or allowlisted. This is a deliberate, permanent list —
        # not a place to dump unmapped directories to silence this check.
        #
        #   .github/   — deliberately NOT in the ignore-allowlist (slice 1's
        #                design): a change anywhere under .github/ other than
        #                the four specific trigger-files must fail-closed and
        #                run every lane, because a stray edit to any workflow
        #                or composite action could affect any category. That
        #                makes .github/ "covered" by design (always safely
        #                fail-closed) rather than a coverage gap that needs a
        #                bead every time someone edits a workflow.
        #   install.sh — a repo-root dev-tooling helper (builds/installs the
        #                `tc` CLI to a developer's machine). Same reasoning as
        #                .github/: it isn't a feature category, and changing
        #                it correctly and safely falls through to the
        #                fail-closed catch-all today. Recognized here so this
        #                assertion doesn't flag a file that was already
        #                deliberately left off the ignore-allowlist.
        DESIGN_EXCEPTIONS=(.github install.sh)

        # Full repo-tree check via git's tracked-file index — robust against
        # untracked build artifacts and hidden-dot-directory glob quirks
        # (unlike `ls -d */`), and automatically excludes .git/ itself.
        ALL_PATHS=$(git ls-tree -r --name-only HEAD)
        TOP_LEVEL=$(printf '%s\n' "$ALL_PATHS" | cut -d/ -f1 | sort -u)
        # mobile/ is a container for two categories (ios, android), not a
        # category itself — its children are checked separately below so a
        # third platform directory added under mobile/ without being mapped
        # is still caught, rather than being waved through because "mobile"
        # itself resolves to a known category prefix.
        MOBILE_CHILDREN=$(printf '%s\n' "$ALL_PATHS" | awk -F/ '$1=="mobile"{print $2}' | sort -u)

        failures=()
        while IFS= read -r entry; do
          [[ -z "$entry" ]] && continue
          is_covered=false

          for cat in "${!CATEGORY_PREFIXES[@]}"; do
            prefix="${CATEGORY_PREFIXES[$cat]}"
            top_segment="${prefix%%/*}"
            if [[ "$entry" == "$top_segment" ]]; then
              is_covered=true
              break
            fi
          done

          if ! $is_covered; then
            for d in "${IGNORE_ALLOWLIST_DIRS[@]}"; do
              if [[ "$entry" == "$d" ]]; then is_covered=true; break; fi
            done
          fi
          if ! $is_covered; then
            for f in "${IGNORE_ALLOWLIST_FILES[@]}"; do
              if [[ "$entry" == "$f" ]]; then is_covered=true; break; fi
            done
          fi
          if ! $is_covered; then
            for g in "${IGNORE_ALLOWLIST_GLOBS[@]}"; do
              # shellcheck disable=SC2053  # intentional unquoted glob match
              if [[ "$entry" == $g ]]; then is_covered=true; break; fi
            done
          fi
          if ! $is_covered; then
            for e in "${DESIGN_EXCEPTIONS[@]}"; do
              if [[ "$entry" == "$e" ]]; then is_covered=true; break; fi
            done
          fi

          if ! $is_covered; then
            failures+=("$entry")
          fi
        done <<< "$TOP_LEVEL"

        if [[ -n "$MOBILE_CHILDREN" ]]; then
          while IFS= read -r child; do
            [[ -z "$child" ]] && continue
            if [[ "$child" != "ios" && "$child" != "android" ]]; then
              failures+=("mobile/$child")
            fi
          done <<< "$MOBILE_CHILDREN"
        fi

        if (( ${#failures[@]} > 0 )); then
          echo "::error::Coverage assertion failed — the following top-level path(s) are neither a mapped category prefix, an ignore-allowlist entry, nor a documented design exception:"
          for fpath in "${failures[@]}"; do
            echo "::error::  - $fpath"
          done
          echo "::error::Fix one of: (a) map it to a category — add an entry to CATEGORY_PREFIXES in .github/actions/detect-changes/category-map.sh; (b) allowlist it — add it to IGNORE_ALLOWLIST_DIRS/FILES/GLOBS in that same file if it never needs a pr-gate lane; (c) if it's a deliberate fail-closed-by-design case like .github/, add it to DESIGN_EXCEPTIONS in this step with a documented reason."
          exit 1
        fi

        echo "Coverage assertion passed — all top-level paths are mapped, allowlisted, or documented design exceptions: $(tr '\n' ' ' <<< "$TOP_LEVEL")"
