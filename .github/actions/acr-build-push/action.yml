# Logs into Azure Container Registry, builds a Docker image, and pushes
# it tagged with both the commit SHA and "latest".
#
# Assumes azure/login has already been called in an earlier step.
name: ACR Build & Push
description: Login to ACR, build a Docker image, and push with SHA + latest tags

inputs:
  acr-login-server:
    description: ACR login server (e.g., myregistry.azurecr.io)
    required: true
  image-name:
    description: Image name without registry prefix (e.g., town-crier-api)
    required: true
  dockerfile:
    description: Dockerfile path relative to working-directory (e.g., Dockerfile, Dockerfile.worker)
    required: false
    default: Dockerfile
  working-directory:
    description: Build context directory
    required: false
    default: "."
  tag:
    description: Primary image tag (defaults to github.sha)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Login to ACR
      shell: bash
      run: az acr login --name "${{ inputs.acr-login-server }}"

    - name: Build and push image
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        TAG="${{ inputs.tag }}"
        TAG="${TAG:-${{ github.sha }}}"
        IMAGE="${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${TAG}"
        LATEST="${{ inputs.acr-login-server }}/${{ inputs.image-name }}:latest"
        docker build -f "${{ inputs.dockerfile }}" -t "$IMAGE" -t "$LATEST" .
        docker push "$IMAGE"
        docker push "$LATEST"

    - name: Prune old ACR manifests (keep newest 5)
      shell: bash
      run: |
        # Basic-tier ACR has no RetentionPolicy, so we prune manually after each push.
        # Keep the 5 newest manifests (by createdTime) for this repo and delete the rest.
        # The "latest" tag is always on the most recently pushed manifest, so it is
        # always retained by virtue of being in the top 5.
        REGISTRY="$(echo "${{ inputs.acr-login-server }}" | cut -d. -f1)"
        IMAGE_NAME="${{ inputs.image-name }}"
        KEEP=5

        echo "Listing manifests for ${REGISTRY}/${IMAGE_NAME}..."
        MANIFESTS_JSON="$(az acr manifest list-metadata \
          --registry "$REGISTRY" \
          --name "$IMAGE_NAME" \
          -o json)"

        # Sort by createdTime descending, drop the first KEEP entries, emit digests for the rest.
        DIGESTS_TO_DELETE="$(echo "$MANIFESTS_JSON" \
          | jq -r --argjson keep "$KEEP" '
              sort_by(.createdTime) | reverse | .[$keep:] | .[].digest
            ')"

        if [ -z "$DIGESTS_TO_DELETE" ]; then
          echo "Nothing to prune (<= ${KEEP} manifests present)."
          exit 0
        fi

        while IFS= read -r DIGEST; do
          [ -z "$DIGEST" ] && continue
          echo "Deleting ${IMAGE_NAME}@${DIGEST}"
          az acr manifest delete \
            --registry "$REGISTRY" \
            --name "${IMAGE_NAME}@${DIGEST}" \
            --yes
        done <<< "$DIGESTS_TO_DELETE"
