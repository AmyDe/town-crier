# Third-party actions pinned to commit SHA for supply-chain safety
# (tj-actions CVE-2025-30066 rationale — issue #835 slice 4).
#
# Deploys components to the dev environment, gated by what changed.
# Triggered on every push to main (squash merges assumed) and via
# workflow_dispatch. A first `changes` job (detect-changes, mode: push)
# determines which of go/web/infra changed in the last commit; every deploy
# job below is gated on its relevant category so the chain short-circuits
# when nothing relevant changed — e.g. a docs-only, iOS-only, or
# Android-only push finishes fast with every job skipped. workflow_dispatch
# bypasses all category gating and deploys everything unconditionally — use
# it to force a full redeploy. Android ships via a future tag-triggered CD
# lane (#779), not on every main push; iOS ships via cd-ios-testflight.yml on
# tag push, not here.
#
# Fail-open by design (issue #835 slice 3): if there's any doubt whether a
# job should run for a given change, it runs. A redundant deploy costs a
# few minutes of CI time; a skipped deploy of paying-customer-facing code
# is a production incident. Every job whose `needs:` includes another job
# that can itself be legitimately skipped uses the
# `always() && (<category> || workflow_dispatch) && (<upstream>.result ==
# 'success' || <upstream>.result == 'skipped')` pattern so a skipped
# upstream (e.g. infra-dev skipped because only api-go/ changed) never
# cascades into skipping a deploy that itself needs to run.
#
# Requires secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   ACR_LOGIN_SERVER       — Azure Container Registry login server
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#
# Requires GitHub Environment:
#   development            — with OIDC federated credential (environment:development)
#
# Requires .github/config/resource-names.env — single source of truth for
# hardcoded Azure resource names (SWA, storage account, container app,
# resource group, ACR image repos). Loaded per-job via `cat ... >>
# "$GITHUB_ENV"` after checkout; asserted against infra/environment.go's
# naming conventions by an /infra Go test (issue #835 slice 6).

name: CD Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ── Detect changes ───────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.detect.outputs.web }}
      infra: ${{ steps.detect.outputs.infra }}
      go: ${{ steps.detect.outputs.go }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # HEAD~1 must be present for push-mode's HEAD~1..HEAD diff — the
          # default shallow (depth-1) checkout only fetches HEAD itself.
          fetch-depth: 2

      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          mode: push
          # cd-dev only ever builds/deploys api-go, worker, web, and infra —
          # cli/ios/android are irrelevant here (cli has no dev deploy lane;
          # ios/android ship via other workflows), so they're not requested.
          categories: go,web,infra

  # ── Infrastructure: shared stack ─────────────────────
  infra-shared:
    name: "Infra: Pulumi up (shared)"
    needs: changes
    if: needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (shared)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select shared
          pulumi up --yes --non-interactive

  # ── Infrastructure: dev stack ────────────────────────
  infra-dev:
    name: "Infra: Pulumi up (dev)"
    needs: [changes, infra-shared]
    if: needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select Pulumi stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack select dev

      - name: Set Pulumi secrets
        uses: ./.github/actions/setup-pulumi-secrets
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          admin-api-key: ${{ secrets.ADMIN_API_KEY }}
          site-build-key: ${{ secrets.SITE_BUILD_KEY }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}

      - name: Pulumi up (dev)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: pulumi up --yes --non-interactive

  # ── Database: run migrations ─────────────────────────
  # Applies pending goose migrations (and the app-role grant sweep) BEFORE the
  # API and worker deploy jobs, so the new image never serves against a stale
  # schema. Authenticates as the CI service principal — a Postgres Entra admin
  # on psql-town-crier-shared — via the OIDC azure-login session, so
  # DefaultAzureCredential yields a passwordless ossrdbms token; no stored DB
  # secret is involved. A non-zero exit fails the deploy loudly (never a silent
  # skip); goose.Up is idempotent, so an up-to-date DB is a no-op. See ADR 0036.
  migrate-dev:
    name: "Database: Run migrations (dev)"
    needs: [changes, infra-dev]
    # Migrations live under api-go/internal/platform/postgres/migrations/ —
    # go category, not infra — so gate on go OR infra. infra-dev can be
    # legitimately skipped (e.g. only api-go/ changed), so treat its
    # 'skipped' result as a pass, not a block.
    if: always() && (needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch') && (needs.infra-dev.result == 'success' || needs.infra-dev.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/pgmigrate
        with:
          database-name: town_crier_dev
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Go API: build & push image ──────────────────────
  api-go-image:
    name: "Go API: Build & push image"
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} instead of inline
      # literals. Must run after checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/acr-build-push
        with:
          acr-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          image-name: ${{ env.IMAGE_REPO_API }}
          working-directory: api-go

  # ── Go Worker: build & push image ───────────────────────
  # Builds the Go worker image and pushes it to ACR. The worker jobs deploy
  # this image (worker-deploy below, image-swap tc-hm20).
  worker-go-image:
    name: "Go Worker: Build & push image"
    needs: changes
    if: needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} instead of inline
      # literals. Must run after checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/acr-build-push
        with:
          acr-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          image-name: ${{ env.IMAGE_REPO_WORKER }}
          dockerfile: Dockerfile.worker
          working-directory: api-go

  # ── Go API: deploy to dev ───────────────────────────
  api-go-deploy:
    name: "Go API: Deploy to dev"
    needs: [changes, api-go-image, infra-dev, migrate-dev]
    # infra-dev/migrate-dev can be legitimately skipped (e.g. only api-go/
    # changed) — a skipped upstream must not cascade-skip this deploy.
    # api-go-image is gated on the same category as this job, so it's never
    # legitimately skipped when this job needs to run — require 'success'.
    if: always() && (needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch') && needs.api-go-image.result == 'success' && (needs.infra-dev.result == 'success' || needs.infra-dev.result == 'skipped') && (needs.migrate-dev.result == 'success' || needs.migrate-dev.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} instead of inline
      # literals. Must run after checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-container-app
        with:
          app-name: ${{ env.CONTAINER_APP_API_DEV }}
          resource-group: ${{ env.RESOURCE_GROUP_DEV }}
          image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO_API }}:${{ github.sha }}

  # ── Worker: deploy to dev ───────────────────────────────
  worker-deploy:
    name: "Worker: Deploy to dev"
    needs: [changes, worker-go-image, infra-dev, migrate-dev]
    # Same pattern as api-go-deploy: infra-dev/migrate-dev can be
    # legitimately skipped without blocking this deploy; worker-go-image is
    # gated on the same category so it must have succeeded.
    if: always() && (needs.changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch') && needs.worker-go-image.result == 'success' && (needs.infra-dev.result == 'success' || needs.infra-dev.result == 'skipped') && (needs.migrate-dev.result == 'success' || needs.migrate-dev.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} instead of inline
      # literals. Must run after checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-worker-jobs
        with:
          # Dev has no poll or poll-bootstrap jobs (ADR 0024).
          jobs: digest digest-hourly dormant-cleanup dev-seed subscription-sweep pg-purge
          env-suffix: dev
          resource-group: ${{ env.RESOURCE_GROUP_DEV }}
          image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO_WORKER }}:${{ github.sha }}

  # ── Web: deploy to dev ──────────────────────────────
  web-deploy:
    name: "Web: Deploy to dev"
    needs: [changes, infra-dev]
    # infra-dev can be legitimately skipped (e.g. only web/ changed) —
    # a skipped upstream must not cascade-skip this deploy.
    if: always() && (needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch') && (needs.infra-dev.result == 'success' || needs.infra-dev.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} instead of inline
      # literals. Must run after checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      # azure-login MUST run before build-web: in render-mode, build-web
      # downloads the weekly seo-snapshot.json from Azure Blob via `az storage
      # blob download --auth-mode login`, which needs the OIDC session.
      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # render-mode: build the SPA, download the weekly snapshot, render
      # /planning/* + sitemap.xml offline — zero Go API / Cosmos calls.
      # Fails loud if the snapshot blob is missing (no live-fetch fallback).
      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          seo-town-min-population: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}
          render-mode: 'true'
          storage-account-name: ${{ env.STORAGE_ACCOUNT_DEV }}

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: ${{ env.SWA_NAME_DEV }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
