# Deploys all components to the dev environment.
# Triggered on every push to main (squash merges assumed) that touches
# deployable code or infra. Pushes that only change docs, iOS, Android, beads,
# Claude config, or markdown/license/git metadata are skipped via
# paths-ignore. Android ships via a future tag-triggered CD lane (#779), not
# on every main push.
#
# All components deploy unconditionally to keep dev in sync with main.
#
# Requires secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   ACR_LOGIN_SERVER       — Azure Container Registry login server
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#
# Requires GitHub Environment:
#   development            — with OIDC federated credential (environment:development)

name: CD Dev

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mobile/ios/**'
      - 'mobile/android/**'
      - '.beads/**'
      - '.claude/**'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

concurrency:
  group: cd-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ── Infrastructure: shared stack ─────────────────────
  infra-shared:
    name: "Infra: Pulumi up (shared)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (shared)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select shared
          pulumi up --yes --non-interactive

  # ── Infrastructure: dev stack ────────────────────────
  infra-dev:
    name: "Infra: Pulumi up (dev)"
    needs: infra-shared
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select Pulumi stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack select dev

      - name: Set Pulumi secrets
        uses: ./.github/actions/setup-pulumi-secrets
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          admin-api-key: ${{ secrets.ADMIN_API_KEY }}
          site-build-key: ${{ secrets.SITE_BUILD_KEY }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}

      - name: Pulumi up (dev)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: pulumi up --yes --non-interactive

  # ── Database: run migrations ─────────────────────────
  # Applies pending goose migrations (and the app-role grant sweep) BEFORE the
  # API and worker deploy jobs, so the new image never serves against a stale
  # schema. Authenticates as the CI service principal — a Postgres Entra admin
  # on psql-town-crier-shared — via the OIDC azure-login session, so
  # DefaultAzureCredential yields a passwordless ossrdbms token; no stored DB
  # secret is involved. A non-zero exit fails the deploy loudly (never a silent
  # skip); goose.Up is idempotent, so an up-to-date DB is a no-op. See ADR 0036.
  migrate-dev:
    name: "Database: Run migrations (dev)"
    needs: infra-dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: api-go/go.mod

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migrations
        working-directory: api-go
        run: |
          go run ./cmd/pgmigrate \
            -host psql-town-crier-shared.postgres.database.azure.com \
            -admin-user town-crier-github-actions \
            -db town_crier_dev \
            -timeout 600s

  # ── Go API: build & push image ──────────────────────
  api-go-image:
    name: "Go API: Build & push image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/acr-build-push
        with:
          acr-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          image-name: town-crier-api-go
          working-directory: api-go

  # ── Go Worker: build & push image ───────────────────────
  # Builds the Go worker image and pushes it to ACR. The worker jobs deploy
  # this image (worker-deploy below, image-swap tc-hm20).
  worker-go-image:
    name: "Go Worker: Build & push image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/acr-build-push
        with:
          acr-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          image-name: town-crier-worker-go
          dockerfile: Dockerfile.worker
          working-directory: api-go

  # ── Go API: deploy to dev ───────────────────────────
  api-go-deploy:
    name: "Go API: Deploy to dev"
    needs: [api-go-image, infra-dev, migrate-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-container-app
        with:
          app-name: ca-town-crier-api-go-dev
          resource-group: rg-town-crier-dev
          image: ${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api-go:${{ github.sha }}

  # ── Worker: deploy to dev ───────────────────────────────
  worker-deploy:
    name: "Worker: Deploy to dev"
    needs: [worker-go-image, infra-dev, migrate-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-worker-jobs
        with:
          # Dev has no poll or poll-bootstrap jobs (ADR 0024).
          jobs: digest digest-hourly dormant-cleanup dev-seed subscription-sweep pg-purge
          env-suffix: dev
          resource-group: rg-town-crier-dev
          image: ${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker-go:${{ github.sha }}

  # ── Web: deploy to dev ──────────────────────────────
  web-deploy:
    name: "Web: Deploy to dev"
    needs: infra-dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: development
    steps:
      - uses: actions/checkout@v6

      # azure-login MUST run before build-web: in render-mode, build-web
      # downloads the weekly seo-snapshot.json from Azure Blob via `az storage
      # blob download --auth-mode login`, which needs the OIDC session.
      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # render-mode: build the SPA, download the weekly snapshot, render
      # /planning/* + sitemap.xml offline — zero Go API / Cosmos calls.
      # Fails loud if the snapshot blob is missing (no live-fetch fallback).
      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          seo-town-min-population: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}
          render-mode: 'true'
          storage-account-name: sttowncrierdev

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: swa-town-crier-dev

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
