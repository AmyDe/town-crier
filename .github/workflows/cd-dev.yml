# Deploys all components to the dev environment.
# Triggered on every push to main (squash merges assumed).
#
# All components deploy unconditionally to keep dev in sync with main.
#
# Requires secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   ACR_LOGIN_SERVER       — Azure Container Registry login server
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#   AUTO_GRANT_PRO_DOMAINS — Comma-separated email domains for automatic Pro tier
#
# Requires GitHub Environment:
#   development            — with OIDC federated credential (environment:development)

name: CD Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Infrastructure: shared stack ─────────────────────
  infra-shared:
    name: "Infra: Pulumi up (shared)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (shared)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select shared
          pulumi up --yes --non-interactive

  # ── Infrastructure: dev stack ────────────────────────
  infra-dev:
    name: "Infra: Pulumi up (dev)"
    needs: infra-shared
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (dev)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select dev
          pulumi config set --secret adminApiKey "${{ secrets.ADMIN_API_KEY }}"
          pulumi config set --secret autoGrantProDomains "${{ secrets.AUTO_GRANT_PRO_DOMAINS }}"
          pulumi up --yes --non-interactive

  # ── API: build & push image ─────────────────────────
  api-image:
    name: "API: Build & push image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:latest" .
          docker push "$IMAGE"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:latest"
        working-directory: api

  # ── Worker: build & push image ──────────────────────────
  worker-image:
    name: "Worker: Build & push image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push worker image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:${{ github.sha }}"
          docker build -f Dockerfile.worker -t "$IMAGE" -t "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:latest" .
          docker push "$IMAGE"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:latest"
        working-directory: api

  # ── API: deploy to dev ──────────────────────────────
  api-deploy:
    name: "API: Deploy to dev"
    needs: [api-image, infra-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get current active revision
        id: old-revision
        run: |
          REV=$(az containerapp ingress traffic show \
            --name ca-town-crier-api-dev \
            --resource-group rg-town-crier-dev \
            --query "[?weight==\`100\`].revisionName | [0]" -o tsv)
          echo "revision=$REV" >> "$GITHUB_OUTPUT"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name "ca-town-crier-api-dev" \
            --resource-group "rg-town-crier-dev" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ github.sha }}"

      - name: Deactivate old revision
        if: steps.old-revision.outputs.revision != ''
        run: |
          az containerapp revision deactivate \
            --name ca-town-crier-api-dev \
            --resource-group rg-town-crier-dev \
            --revision "${{ steps.old-revision.outputs.revision }}" || true

  # ── Worker: deploy to dev ───────────────────────────────
  worker-deploy:
    name: "Worker: Deploy to dev"
    needs: [worker-image, infra-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy worker image to Job
        run: |
          az containerapp job update \
            --name "job-town-crier-poll-dev" \
            --resource-group "rg-town-crier-dev" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:${{ github.sha }}"

  # ── Web: deploy to dev ──────────────────────────────
  web-deploy:
    name: "Web: Deploy to dev"
    needs: infra-dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "swa-town-crier-dev" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
