# Deploys all components to the dev environment.
# Triggered on every push to main (squash merges assumed).
#
# All components deploy unconditionally to keep dev in sync with main.
#
# Requires secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   ACR_LOGIN_SERVER       — Azure Container Registry login server
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#   AUTO_GRANT_PRO_DOMAINS — Comma-separated email domains for automatic Pro tier
#
# Requires GitHub Environment:
#   development            — with OIDC federated credential (environment:development)

name: CD Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Infrastructure: shared stack ─────────────────────
  infra-shared:
    name: "Infra: Pulumi up (shared)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (shared)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select shared
          pulumi up --yes --non-interactive

  # ── Infrastructure: dev stack ────────────────────────
  infra-dev:
    name: "Infra: Pulumi up (dev)"
    needs: infra-shared
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select Pulumi stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack select dev

      - name: Set Pulumi secrets
        uses: ./.github/actions/setup-pulumi-secrets
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          admin-api-key: ${{ secrets.ADMIN_API_KEY }}
          auto-grant-pro-domains: ${{ secrets.AUTO_GRANT_PRO_DOMAINS }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}

      - name: Pulumi up (dev)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: pulumi up --yes --non-interactive

  # ── API: build & push image ─────────────────────────
  api-image:
    name: "API: Build & push image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/acr-build-push
        with:
          acr-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          image-name: town-crier-api
          working-directory: api

  # ── Worker: build & push image ──────────────────────────
  worker-image:
    name: "Worker: Build & push image"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/acr-build-push
        with:
          acr-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          image-name: town-crier-worker
          dockerfile: Dockerfile.worker
          working-directory: api

  # ── API: deploy to dev ──────────────────────────────
  api-deploy:
    name: "API: Deploy to dev"
    needs: [api-image, infra-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-container-app
        with:
          app-name: ca-town-crier-api-dev
          resource-group: rg-town-crier-dev
          image: ${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ github.sha }}

  # ── Worker: deploy to dev ───────────────────────────────
  worker-deploy:
    name: "Worker: Deploy to dev"
    needs: [worker-image, infra-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-worker-jobs
        with:
          # Dev has no poll or poll-bootstrap jobs (ADR 0024).
          jobs: digest digest-hourly dormant-cleanup
          env-suffix: dev
          resource-group: rg-town-crier-dev
          image: ${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:${{ github.sha }}

  # ── Web: deploy to dev ──────────────────────────────
  web-deploy:
    name: "Web: Deploy to dev"
    needs: infra-dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: swa-town-crier-dev

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
