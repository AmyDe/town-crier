# Requires secrets:
#   AZURE_CLIENT_ID              — OIDC federated credential for Azure login
#   AZURE_TENANT_ID              — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID        — Azure subscription
#   ACR_LOGIN_SERVER             — Azure Container Registry login server
#   AUTH0_CLIENT_SECRET          — Auth0 client secret (if required by SPA app)
#   INTEGRATION_TEST_USERNAME    — Auth0 test user email
#   INTEGRATION_TEST_PASSWORD    — Auth0 test user password
#
# Requires variables:
#   VITE_AUTH0_DOMAIN            — Auth0 domain
#   VITE_AUTH0_CLIENT_ID         — Auth0 client ID
#   VITE_AUTH0_AUDIENCE          — Auth0 API audience

name: PR Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      api: ${{ steps.detect.outputs.api }}
      ios: ${{ steps.detect.outputs.ios }}
      web: ${{ steps.detect.outputs.web }}
      infra: ${{ steps.detect.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          mode: pr
          base-ref: ${{ github.base_ref }}
          categories: api,ios,web,infra
          trigger-files: |
            .github/workflows/pr-gate.yml:api,ios,web,infra
            .github/workflows/cd-dev.yml:api,web,infra
            .github/workflows/cd-prod.yml:infra

  # ── API ──────────────────────────────────────────────

  api-format:
    name: "API: Format"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: api/global.json
      - run: dotnet format --verify-no-changes
        working-directory: api

  api-build-test:
    name: "API: Build & test"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: api/global.json
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/**/*.csproj', 'api/**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
        working-directory: api
      - run: dotnet build --no-restore --configuration Release
        working-directory: api
      - name: Run unit tests
        run: |
          dotnet test tests/town-crier.application.tests --no-build --configuration Release
          dotnet test tests/town-crier.web.tests --no-build --configuration Release
          dotnet test tests/town-crier.infrastructure.tests --no-build --configuration Release
        working-directory: api

  # ── API: staging deploy ─────────────────────────────

  api-staging:
    name: "API: Deploy staging revision"
    needs: [changes, api-build-test]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development
    outputs:
      staging-url: ${{ steps.staging-url.outputs.url }}
      new-revision: ${{ steps.deploy.outputs.revision }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ github.event.pull_request.head.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
        working-directory: api

      - name: Get current active revision
        id: current
        run: |
          CURRENT=$(az containerapp ingress traffic show \
            --name ca-town-crier-api-dev \
            --resource-group rg-town-crier-dev \
            --query "[?weight==\`100\`].revisionName | [0]" -o tsv)
          echo "revision=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Deploy staging revision
        id: deploy
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          az containerapp update \
            --name ca-town-crier-api-dev \
            --resource-group rg-town-crier-dev \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ github.event.pull_request.head.sha }}" \
            --revision-suffix "pr${SHORT_SHA}"
          echo "revision=ca-town-crier-api-dev--pr${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Pin traffic to current revision
        run: |
          if [ -n "${{ steps.current.outputs.revision }}" ]; then
            az containerapp ingress traffic set \
              --name ca-town-crier-api-dev \
              --resource-group rg-town-crier-dev \
              --revision-weight "${{ steps.current.outputs.revision }}=100"
          fi

      - name: Get staging URL
        id: staging-url
        run: |
          APP_FQDN=$(az containerapp show \
            --name ca-town-crier-api-dev \
            --resource-group rg-town-crier-dev \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          ENV_DOMAIN="${APP_FQDN#*.}"
          echo "url=https://${{ steps.deploy.outputs.revision }}.${ENV_DOMAIN}" >> "$GITHUB_OUTPUT"

  # ── API: integration tests ──────────────────────────

  api-integration-test:
    name: "API: Integration tests"
    needs: [api-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: api/global.json

      - name: Build integration tests
        run: dotnet build tests/town-crier.integration-tests --configuration Release
        working-directory: api

      - name: Run integration tests
        working-directory: api
        env:
          INTEGRATION_TEST_API_BASE_URL: ${{ needs.api-staging.outputs.staging-url }}
          INTEGRATION_TEST_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          INTEGRATION_TEST_AUTH0_CLIENT_ID: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          INTEGRATION_TEST_AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          INTEGRATION_TEST_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}
          INTEGRATION_TEST_USERNAME: ${{ secrets.INTEGRATION_TEST_USERNAME }}
          INTEGRATION_TEST_PASSWORD: ${{ secrets.INTEGRATION_TEST_PASSWORD }}
        run: |
          printenv | grep ^INTEGRATION_TEST_ > tests/town-crier.integration-tests/bin/Release/net10.0/.env
          dotnet exec tests/town-crier.integration-tests/bin/Release/net10.0/town-crier.integration-tests.dll

  # ── API: clean up staging revision ───────────────────

  api-staging-cleanup:
    name: "API: Deactivate staging revision"
    needs: [api-staging, api-integration-test]
    if: always() && needs.api-staging.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deactivate staging revision
        run: |
          az containerapp revision deactivate \
            --name ca-town-crier-api-dev \
            --resource-group rg-town-crier-dev \
            --revision "${{ needs.api-staging.outputs.new-revision }}" || true

  # ── iOS ──────────────────────────────────────────────

  ios-lint:
    name: "iOS: SwiftLint"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: brew install swiftlint
      - run: swiftlint lint
        working-directory: mobile/ios

  ios-build-test:
    name: "iOS: Build & test"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: mobile/ios/.build
          key: ios-${{ runner.os }}-${{ hashFiles('mobile/ios/Package.resolved') }}
          restore-keys: ios-${{ runner.os }}-
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: mobile/ios
      - run: >
          xcodebuild build
          -project TownCrier.xcodeproj
          -scheme TownCrierApp
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -derivedDataPath .derivedData
        working-directory: mobile/ios
      - run: swift test
        working-directory: mobile/ios

  # ── Web ──────────────────────────────────────────────

  web-lint:
    name: "Web: Lint"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  web-build-test:
    name: "Web: Type-check, test & build"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web
      - run: npx vitest run
        working-directory: web
      - run: npm run build
        working-directory: web

  # ── Infrastructure ───────────────────────────────────

  infra-preview:
    name: "Infra: Pulumi preview"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi preview
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select ${{ vars.PULUMI_STACK }}
          pulumi preview --non-interactive 2>&1 | tee /tmp/pulumi-preview.txt

      - name: Comment preview on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW=$(cat /tmp/pulumi-preview.txt)
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(printf '<details><summary>Pulumi preview — <code>${{ vars.PULUMI_STACK }}</code></summary>\n\n```\n%s\n```\n\n</details>' "$PREVIEW")"

  # ── Gate (sole required status check) ────────────────

  gate:
    name: PR Gate
    needs: [api-format, api-build-test, api-staging, api-integration-test, api-staging-cleanup, ios-lint, ios-build-test, web-lint, web-build-test, infra-preview]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.api-format.result }}"
            "${{ needs.api-build-test.result }}"
            "${{ needs.api-staging.result }}"
            "${{ needs.api-integration-test.result }}"
            "${{ needs.api-staging-cleanup.result }}"
            "${{ needs.ios-lint.result }}"
            "${{ needs.ios-build-test.result }}"
            "${{ needs.web-lint.result }}"
            "${{ needs.web-build-test.result }}"
            "${{ needs.infra-preview.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "A required check failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped"
