name: PR Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ios: ${{ steps.filter.outputs.ios }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          has_api=false
          has_ios=false
          has_web=false
          has_infra=false

          # Shared workflow files trigger multiple components — check before per-file loop
          if echo "$CHANGED" | grep -q '.github/workflows/pr-gate.yml'; then
            has_api=true; has_ios=true; has_web=true; has_infra=true
          fi
          if echo "$CHANGED" | grep -q '.github/workflows/cd-dev.yml'; then
            has_api=true; has_web=true; has_infra=true
          fi
          if echo "$CHANGED" | grep -q '.github/workflows/cd-prod.yml'; then
            has_infra=true
          fi

          while IFS= read -r file; do
            case "$file" in
              api/*) has_api=true ;;
              mobile/ios/*) has_ios=true ;;
              web/*) has_web=true ;;
              infra/*) has_infra=true ;;
            esac
          done <<< "$CHANGED"

          echo "api=$has_api" >> "$GITHUB_OUTPUT"
          echo "ios=$has_ios" >> "$GITHUB_OUTPUT"
          echo "web=$has_web" >> "$GITHUB_OUTPUT"
          echo "infra=$has_infra" >> "$GITHUB_OUTPUT"

          echo "Results: api=$has_api ios=$has_ios web=$has_web infra=$has_infra"

  # ── API ──────────────────────────────────────────────

  api-format:
    name: "API: Format"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: api/global.json
      - run: dotnet format --verify-no-changes
        working-directory: api

  api-build-test:
    name: "API: Build & test"
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: api/global.json
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('api/**/*.csproj', 'api/**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore
        working-directory: api
      - run: dotnet build --no-restore --configuration Release
        working-directory: api
      - run: dotnet test --no-build --configuration Release
        working-directory: api

  # ── iOS ──────────────────────────────────────────────

  ios-lint:
    name: "iOS: SwiftLint"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftlint
      - run: swiftlint lint
        working-directory: mobile/ios

  ios-build-test:
    name: "iOS: Build & test"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            mobile/ios/.build
            mobile/ios/.derivedData
          key: ios-${{ runner.os }}-${{ hashFiles('mobile/ios/Package.resolved') }}
          restore-keys: ios-${{ runner.os }}-
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: mobile/ios
      - run: >
          xcodebuild build
          -project TownCrier.xcodeproj
          -scheme TownCrierApp
          -destination 'platform=iOS Simulator,name=iPhone 16'
          -derivedDataPath .derivedData
        working-directory: mobile/ios
      - run: swift test
        working-directory: mobile/ios

  # ── Web ──────────────────────────────────────────────

  web-lint:
    name: "Web: Lint"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  web-build-test:
    name: "Web: Type-check, test & build"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web
      - run: npx vitest run
        working-directory: web
      - run: npm run build
        working-directory: web

  # ── Infrastructure ───────────────────────────────────

  infra-preview:
    name: "Infra: Pulumi preview"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: api/global.json
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-infra-${{ runner.os }}-${{ hashFiles('infra/**/*.csproj') }}
          restore-keys: nuget-infra-${{ runner.os }}-
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ vars.PULUMI_STACK }}
          work-dir: infra
          comment-on-pr: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Gate (sole required status check) ────────────────

  gate:
    name: PR Gate
    needs: [api-format, api-build-test, ios-lint, ios-build-test, web-lint, web-build-test, infra-preview]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.api-format.result }}"
            "${{ needs.api-build-test.result }}"
            "${{ needs.ios-lint.result }}"
            "${{ needs.ios-build-test.result }}"
            "${{ needs.web-lint.result }}"
            "${{ needs.web-build-test.result }}"
            "${{ needs.infra-preview.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "A required check failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped"
