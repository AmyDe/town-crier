# Requires secrets:
#   AZURE_CLIENT_ID              — OIDC federated credential for Azure login
#   AZURE_TENANT_ID              — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID        — Azure subscription
#   ACR_LOGIN_SERVER             — Azure Container Registry login server
#   AUTH0_CLIENT_SECRET          — Auth0 client secret (if required by SPA app)
#   INTEGRATION_TEST_USERNAME    — Auth0 test user email
#   INTEGRATION_TEST_PASSWORD    — Auth0 test user password
#
# Requires variables:
#   VITE_AUTH0_DOMAIN            — Auth0 domain
#   VITE_AUTH0_CLIENT_ID         — Auth0 client ID
#   VITE_AUTH0_AUDIENCE          — Auth0 API audience

name: PR Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  merge_group:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: Detect changes
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cli: ${{ steps.detect.outputs.cli }}
      ios: ${{ steps.detect.outputs.ios }}
      web: ${{ steps.detect.outputs.web }}
      infra: ${{ steps.detect.outputs.infra }}
      go: ${{ steps.detect.outputs.go }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          mode: ${{ github.event_name == 'merge_group' && 'merge_group' || 'pr' }}
          base-ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.base_ref }}
          categories: cli,ios,web,infra,go
          trigger-files: |
            .github/workflows/pr-gate.yml:cli,ios,web,infra,go
            .github/workflows/cd-dev.yml:web,infra,go
            .github/workflows/cd-prod.yml:infra
            .github/workflows/cd-ios-testflight.yml:ios

  # ── Go API ───────────────────────────────────────────

  go-lint:
    name: "Go API: Lint"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: api-go/go.mod
          # No go.sum yet (zero dependencies); enable module caching when one appears.
          cache: false
      - name: gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::gofmt required on: $UNFORMATTED"
            exit 1
          fi
        working-directory: api-go
      - run: go vet ./...
        working-directory: api-go
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
          working-directory: api-go

  go-test:
    name: "Go API: Build & test"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: api-go/go.mod
          cache: false
      - run: go build ./...
        working-directory: api-go
      - name: Run tests (race detector + coverage)
        run: go test -race -coverprofile=coverage.out ./...
        working-directory: api-go
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: api-go/coverage.out
          if-no-files-found: ignore
          retention-days: 7

  # ── CLI ──────────────────────────────────────────────

  cli-format:
    name: "CLI: Format"
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: cli/global.json
      - run: dotnet format --verify-no-changes
        working-directory: cli

  cli-build-test:
    name: "CLI: Build & test"
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: cli/global.json
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-cli-${{ runner.os }}-${{ hashFiles('cli/**/*.csproj', 'cli/**/Directory.Build.props') }}
          restore-keys: nuget-cli-${{ runner.os }}-
      - run: dotnet restore
        working-directory: cli
      - run: dotnet build --no-restore --configuration Release
        working-directory: cli
      - name: Run tests
        run: dotnet test tests/tc.tests --no-build --configuration Release
        working-directory: cli

  # ── iOS ──────────────────────────────────────────────

  ios-lint:
    name: "iOS: SwiftLint"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint 0.63.2 (pinned — avoids latest-ruleset drift, tc-6kdu)
        run: |
          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" \
            https://github.com/realm/SwiftLint/releases/download/0.63.2/portable_swiftlint.zip
          unzip -o "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swiftlint"
          echo "$RUNNER_TEMP/swiftlint" >> "$GITHUB_PATH"
      - run: swiftlint version
      - run: swiftlint lint --strict
        working-directory: mobile/ios

  ios-build-test:
    name: "iOS: Build & test"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: mobile/ios/.build
          key: ios-${{ runner.os }}-${{ hashFiles('mobile/ios/Package.resolved') }}
          restore-keys: ios-${{ runner.os }}-
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: mobile/ios
      - run: >
          xcodebuild build
          -project TownCrier.xcodeproj
          -scheme TownCrierApp
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath .derivedData
        working-directory: mobile/ios
      - run: swift test
        working-directory: mobile/ios

  # ── Web ──────────────────────────────────────────────

  web-lint:
    name: "Web: Lint"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  web-build-test:
    name: "Web: Type-check, test & build"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web
      - run: npx vitest run
        working-directory: web
      - run: npm run build
        working-directory: web

  # ── Infrastructure ───────────────────────────────────

  infra-preview:
    name: "Infra: Pulumi preview"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi preview
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select ${{ vars.PULUMI_STACK }}
          pulumi preview --non-interactive 2>&1 | tee /tmp/pulumi-preview.txt

      - name: Comment preview on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW=$(cat /tmp/pulumi-preview.txt)
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(printf '<details><summary>Pulumi preview — <code>${{ vars.PULUMI_STACK }}</code></summary>\n\n```\n%s\n```\n\n</details>' "$PREVIEW")"

  # ── Gate (sole required status check) ────────────────

  gate:
    name: PR Gate
    needs: [go-lint, go-test, cli-format, cli-build-test, ios-lint, ios-build-test, web-lint, web-build-test, infra-preview]
    if: always() && (github.event_name != 'pull_request' || github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.go-lint.result }}"
            "${{ needs.go-test.result }}"
            "${{ needs.cli-format.result }}"
            "${{ needs.cli-build-test.result }}"
            "${{ needs.ios-lint.result }}"
            "${{ needs.ios-build-test.result }}"
            "${{ needs.web-lint.result }}"
            "${{ needs.web-build-test.result }}"
            "${{ needs.infra-preview.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "A required check failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped"
