# Third-party actions pinned to commit SHA for supply-chain safety
# (tj-actions CVE-2025-30066 rationale — issue #835 slice 4).
#
# Requires secrets:
#   AZURE_CLIENT_ID              — OIDC federated credential for Azure login
#   AZURE_TENANT_ID              — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID        — Azure subscription
#   ACR_LOGIN_SERVER             — Azure Container Registry login server
#   AUTH0_CLIENT_SECRET          — Auth0 client secret (if required by SPA app)
#   INTEGRATION_TEST_USERNAME    — Auth0 test user email
#   INTEGRATION_TEST_PASSWORD    — Auth0 test user password
#
# Requires variables:
#   VITE_AUTH0_DOMAIN            — Auth0 domain
#   VITE_AUTH0_CLIENT_ID         — Auth0 client ID
#   VITE_AUTH0_AUDIENCE          — Auth0 API audience

name: PR Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  merge_group:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect changes
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cli: ${{ steps.detect.outputs.cli }}
      ios: ${{ steps.detect.outputs.ios }}
      android: ${{ steps.detect.outputs.android }}
      web: ${{ steps.detect.outputs.web }}
      infra: ${{ steps.detect.outputs.infra }}
      go: ${{ steps.detect.outputs.go }}
      gha: ${{ steps.detect.outputs.gha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          mode: ${{ github.event_name == 'merge_group' && 'merge_group' || 'pr' }}
          base-ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.base_ref }}
          # `gha` (issue #835 slice 4) drives the github-actions-lint job
          # below — see detect-changes/action.yml's header for why it's
          # computed independently rather than as a mapped CATEGORY_PREFIX.
          categories: cli,ios,android,web,infra,go,gha
          trigger-files: |
            .github/workflows/pr-gate.yml:cli,ios,android,web,infra,go
            .github/workflows/cd-dev.yml:web,infra,go
            .github/workflows/cd-prod.yml:infra
            .github/workflows/cd-ios-testflight.yml:ios

  # ── Go API ───────────────────────────────────────────

  go-lint:
    name: "Go API: Lint"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: api-go/go.mod
          # No go.sum yet (zero dependencies); enable module caching when one appears.
          cache: false
      - name: gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::gofmt required on: $UNFORMATTED"
            exit 1
          fi
        working-directory: api-go
      - run: go vet ./...
        working-directory: api-go
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.12
          working-directory: api-go

  go-test:
    name: "Go API: Build & test"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: api-go/go.mod
          cache: false
      - run: go build ./...
        working-directory: api-go
      - name: Run tests (race detector + coverage)
        run: go test -race -coverprofile=coverage.out ./...
        working-directory: api-go
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: go-coverage
          path: api-go/coverage.out
          if-no-files-found: ignore
          retention-days: 7

  go-integration:
    name: "Go API: Integration tests"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: towncrier
          POSTGRES_PASSWORD: towncrier
          POSTGRES_DB: towncrier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U towncrier -d towncrier_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: api-go/go.mod
          cache: false
      # Real Postgres + PostGIS (the `integration` build tag); the harness reads
      # TEST_DATABASE_URL and would otherwise skip. Proves the spatial reads the
      # Cosmos Gateway cannot serve cross-partition (memo 0010).
      - name: Run integration tests (real Postgres + PostGIS)
        run: go test -tags=integration ./...
        working-directory: api-go
        env:
          TEST_DATABASE_URL: postgres://towncrier:towncrier@localhost:5432/towncrier_test?sslmode=disable

  # ── CLI (Go) ─────────────────────────────────────────

  cli-lint:
    name: "CLI: Lint"
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: cli/go.mod
          # No go.sum yet (zero dependencies); enable module caching when one appears.
          cache: false
      - name: gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::gofmt required on: $UNFORMATTED"
            exit 1
          fi
        working-directory: cli
      - run: go vet ./...
        working-directory: cli
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: v2.12
          working-directory: cli

  cli-build-test:
    name: "CLI: Build & test"
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: cli/go.mod
          cache: false
      - run: go build ./...
        working-directory: cli
      - name: Run tests (race detector)
        run: go test -race ./...
        working-directory: cli

  # ── iOS ──────────────────────────────────────────────

  ios-lint:
    name: "iOS: SwiftLint"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install SwiftLint 0.63.2 (pinned — avoids latest-ruleset drift, tc-6kdu)
        run: |
          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" \
            https://github.com/realm/SwiftLint/releases/download/0.63.2/portable_swiftlint.zip
          unzip -o "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swiftlint"
          echo "$RUNNER_TEMP/swiftlint" >> "$GITHUB_PATH"
      - run: swiftlint version
      - run: swiftlint lint --strict
        working-directory: mobile/ios

  ios-build-test:
    name: "iOS: Build & test"
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: mobile/ios/.build
          key: ios-${{ runner.os }}-${{ hashFiles('mobile/ios/Package.resolved') }}
          restore-keys: ios-${{ runner.os }}-
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: mobile/ios
      - run: >
          xcodebuild build
          -project TownCrier.xcodeproj
          -scheme TownCrierApp
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath .derivedData
        working-directory: mobile/ios
      - run: swift test
        working-directory: mobile/ios

  ios-release-note-guard:
    name: "iOS: Release-note guard"
    needs: changes
    if: needs.changes.outputs.ios == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/release-note-guard
        with:
          platform: ios

  # ── Android ──────────────────────────────────────────

  android-lint:
    name: "Android: Lint"
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          # Matches mobile/android/README.md's local toolchain-setup packages
          # (minus the emulator/system-image, which CI never needs — no
          # instrumented tests run here, JVM unit tests only).
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - run: ./gradlew ktlintCheck detekt
        working-directory: mobile/android

  android-build-test:
    name: "Android: Build & test"
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - run: ./gradlew test :app:assembleDevDebug
        working-directory: mobile/android

  android-release-note-guard:
    name: "Android: Release-note guard"
    needs: changes
    if: needs.changes.outputs.android == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/release-note-guard
        with:
          platform: android

  # ── Web ──────────────────────────────────────────────

  web-lint:
    name: "Web: Lint"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  web-build-test:
    name: "Web: Type-check, test & build"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx tsc --noEmit
        working-directory: web
      - run: npx vitest run
        working-directory: web
      - run: npm run build
        working-directory: web

  # ── Infrastructure ───────────────────────────────────

  infra-preview:
    name: "Infra: Pulumi preview"
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-infra

      # Credential-free validation. Dependabot-triggered runs cannot read Actions
      # secrets, so the Azure-authenticated pulumi preview below is skipped for
      # them. A compile + vet check is the meaningful gate for a dependency bump:
      # Dependabot can only touch go.mod/go.sum, so "does the program still build"
      # fully covers what it can change.
      - name: Build & vet infra program
        working-directory: infra
        run: |
          go build ./...
          go vet ./...

      - uses: ./.github/actions/azure-login
        if: github.actor != 'dependabot[bot]'
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select Pulumi stack
        if: github.actor != 'dependabot[bot]'
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack select ${{ vars.PULUMI_STACK }}

      - name: Set Pulumi secrets
        if: github.actor != 'dependabot[bot]'
        uses: ./.github/actions/setup-pulumi-secrets
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          admin-api-key: ${{ secrets.ADMIN_API_KEY }}
          site-build-key: ${{ secrets.SITE_BUILD_KEY }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}

      - name: Pulumi preview
        if: github.actor != 'dependabot[bot]'
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -o pipefail
          pulumi preview --non-interactive 2>&1 | tee /tmp/pulumi-preview.txt

      - name: Comment preview on PR
        if: always() && github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW=$(cat /tmp/pulumi-preview.txt)
          # shellcheck disable=SC2016  # false positive (issue #835 slice 4,
          # actionlint/zizmor pass): the ${{ vars.PULUMI_STACK }} inside the
          # single-quoted printf format is a GitHub Actions expression,
          # substituted server-side before bash ever parses this script — not
          # a shell variable that needs double quotes to expand. The
          # single-quoted format string is intentional; %s is the only real
          # printf substitution, filled from "$PREVIEW" below.
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(printf '<details><summary>Pulumi preview — <code>${{ vars.PULUMI_STACK }}</code></summary>\n\n```\n%s\n```\n\n</details>' "$PREVIEW")"

  # ── GitHub Actions (CI itself) ───────────────────────
  # issue #835 slice 4: lints the CI's own workflow/action YAML — actionlint
  # for syntax/shellcheck/semantic issues, zizmor for GitHub-Actions-specific
  # security findings (unpinned actions, template injection, credential
  # persistence, etc.). Gated on the `gha` category (any .github/ change),
  # computed independently in detect-changes so it doesn't disturb slice 1's
  # existing .github/ fail-closed behavior for the other categories — see
  # detect-changes/action.yml's header.
  github-actions-lint:
    name: "GitHub Actions: Lint (actionlint + zizmor)"
    needs: changes
    if: needs.changes.outputs.gha == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install actionlint 1.7.12 (pinned — matches local dev tooling; checksum-verified)
        run: |
          set -euo pipefail
          curl -fsSL -o "$RUNNER_TEMP/actionlint.tar.gz" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $RUNNER_TEMP/actionlint.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - run: actionlint -version

      - name: Run actionlint
        run: actionlint -color

      # zizmor (https://zizmor.sh) isn't packaged for apt/local dev tooling
      # here, so it's installed at run time via uv/uvx — the tool's own
      # documented recommended CI integration (docs.zizmor.sh/integrations,
      # "Manual integration" / annotations recipe). uvx runs a pinned
      # release straight from PyPI without a persistent install step.
      - name: Install uv (for zizmor via uvx)
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Run zizmor (GitHub Actions security lint)
        # --format=github emits GH-native error annotations and preserves
        # zizmor's severity-based exit codes (11-14) — unlike --format=sarif,
        # which always exits 0 and requires GitHub Advanced Security to
        # surface anything. GH_TOKEN enables zizmor's "online" mode (fuller
        # audit coverage, e.g. impostor-commit checks); the default
        # read-only github.token is sufficient. zizmor auto-discovers
        # .github/zizmor.yml for the accepted-risk/deferred waivers
        # documented there — see that file for the rationale per finding.
        env:
          GH_TOKEN: ${{ github.token }}
        run: uvx "zizmor@1.26.1" --format=github .

  # ── Gate (sole required status check) ────────────────

  gate:
    name: PR Gate
    # `changes` must be listed here even though nothing below reads its
    # outputs directly: if the coverage-assertion step inside detect-changes
    # fails, the `changes` job's result becomes `failure`, and every
    # downstream job below (each `needs: changes`) gets SKIPPED rather than
    # failed. A skipped result doesn't trip the failure/cancelled check below,
    # so without `changes` in this needs array a failing coverage assertion
    # would be silently swallowed and `gate` would report success (issue
    # #835 slice 2 — found during implementation, not in the original scope).
    needs: [changes, go-lint, go-test, go-integration, cli-lint, cli-build-test, ios-lint, ios-build-test, ios-release-note-guard, android-lint, android-build-test, android-release-note-guard, web-lint, web-build-test, infra-preview, github-actions-lint]
    if: always() && (github.event_name != 'pull_request' || github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.changes.result }}"
            "${{ needs.go-lint.result }}"
            "${{ needs.go-test.result }}"
            "${{ needs.go-integration.result }}"
            "${{ needs.cli-lint.result }}"
            "${{ needs.cli-build-test.result }}"
            "${{ needs.ios-lint.result }}"
            "${{ needs.ios-build-test.result }}"
            "${{ needs.ios-release-note-guard.result }}"
            "${{ needs.android-lint.result }}"
            "${{ needs.android-build-test.result }}"
            "${{ needs.android-release-note-guard.result }}"
            "${{ needs.web-lint.result }}"
            "${{ needs.web-build-test.result }}"
            "${{ needs.infra-preview.result }}"
            "${{ needs.github-actions-lint.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "A required check failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped"
