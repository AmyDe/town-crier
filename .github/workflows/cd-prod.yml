# Deploys all server-side components to the production environment.
# Triggered by pushing a semver tag (e.g., v1.0.0).
#
# Requires repo-level secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   ACR_LOGIN_SERVER       — Azure Container Registry login server (for digest resolve)
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#
# Requires GitHub Environment:
#   production             — with OIDC federated credential (environment:production)

name: CD Production

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ── Infrastructure ────────────────────────────────────
  infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      resource-group: ${{ steps.outputs.outputs.resource-group }}
      swa-name: ${{ steps.outputs.outputs.swa-name }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-go-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select Pulumi stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack select prod

      - name: Set Pulumi secrets
        uses: ./.github/actions/setup-pulumi-secrets
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          admin-api-key: ${{ secrets.ADMIN_API_KEY }}
          site-build-key: ${{ secrets.SITE_BUILD_KEY }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}

      - name: Pulumi up (prod)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: pulumi up --yes --non-interactive

      - name: Extract Pulumi outputs
        id: outputs
        working-directory: infra
        run: |
          echo "resource-group=$(pulumi stack output resourceGroupName --stack prod)" >> "$GITHUB_OUTPUT"
          echo "swa-name=$(pulumi stack output staticWebAppName --stack prod)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── Database: run migrations ─────────────────────────
  # Applies pending goose migrations (and the app-role grant sweep) BEFORE the
  # API and worker deploy jobs, so the new image never serves against a stale
  # schema. Authenticates as the CI service principal — a Postgres Entra admin
  # on psql-town-crier-shared — via the OIDC azure-login session, so
  # DefaultAzureCredential yields a passwordless ossrdbms token; no stored DB
  # secret is involved. A non-zero exit fails the deploy loudly (never a silent
  # skip); goose.Up is idempotent, so an up-to-date DB is a no-op. See ADR 0036.
  migrate-prod:
    name: "Database: Run migrations (prod)"
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: api-go/go.mod

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migrations
        working-directory: api-go
        run: |
          go run ./cmd/pgmigrate \
            -host psql-town-crier-shared.postgres.database.azure.com \
            -admin-user town-crier-github-actions \
            -db town_crier_prod \
            -timeout 120s

  # ── Go API ────────────────────────────────────────────
  api-go:
    name: Deploy Go API
    needs: [infra, migrate-prod]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag to commit SHA
        id: resolve
        run: echo "sha=$(git rev-parse "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Resolve to an IMMUTABLE DIGEST (registry/repo@sha256:…), never a
      # mutable tag. Prefer the exact tag-SHA image; else fall back to the
      # current :latest digest; else fail. Deploying by digest means a code
      # change rolls a new revision (digest differs) and an unchanged image is
      # a legitimate no-op — the silent ":latest string == :latest string"
      # no-op that froze prod becomes impossible.
      - name: Resolve Go API image digest
        id: resolve-image
        run: |
          ACR_SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_SERVER%.azurecr.io}"
          REPO="town-crier-api-go"
          SHA="${{ steps.resolve.outputs.sha }}"

          digest_for_tag() {
            az acr repository show \
              --name "$ACR_NAME" \
              --image "${REPO}:$1" \
              --query digest -o tsv 2>/dev/null
          }

          # `|| true`: GitHub `run:` steps use `bash -e`, so a failed command
          # substitution aborts the step. Without it, a missing SHA-tagged image
          # (e.g. a tag whose commit didn't rebuild this image — an iOS-only or
          # CI-only merge) kills the job before the `latest` fallback can run.
          DIGEST="$(digest_for_tag "$SHA" || true)"
          if [ -n "$DIGEST" ]; then
            echo "Using exact image for SHA $SHA ($DIGEST)"
          else
            DIGEST="$(digest_for_tag latest || true)"
            if [ -n "$DIGEST" ]; then
              echo "No image for SHA $SHA — falling back to latest ($DIGEST)"
            else
              echo "::error::No Go API image found (tried SHA $SHA and latest)"
              exit 1
            fi
          fi

          echo "image=${ACR_SERVER}/${REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/deploy-container-app
        with:
          app-name: ca-town-crier-api-go-prod
          resource-group: ${{ needs.infra.outputs.resource-group }}
          image: ${{ steps.resolve-image.outputs.image }}

      # Durably tag the digest we just shipped as release-<version> inside the
      # same registry. The acr-build-push prune step protects any manifest
      # carrying a "release-*" tag, so this digest survives dev-build churn and
      # stays available for an ACA rollback-by-digest. `az acr import` with the
      # source and target in the same registry only adds a tag to the existing
      # manifest (no data movement); `--force` makes it idempotent on re-run.
      # Runs only after a successful deploy, so we protect digests that shipped.
      - name: Tag deployed Go API digest as durable release
        run: |
          ACR_SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_SERVER%.azurecr.io}"
          REPO="town-crier-api-go"
          az acr import \
            --name "$ACR_NAME" \
            --source "${{ steps.resolve-image.outputs.image }}" \
            --image "${REPO}:release-${GITHUB_REF_NAME}" \
            --force

  # ── Worker ───────────────────────────────────────────────
  worker:
    name: Deploy Worker
    needs: [infra, migrate-prod]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag to commit SHA
        id: resolve
        run: echo "sha=$(git rev-parse "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Resolve to an IMMUTABLE DIGEST (registry/repo@sha256:…), never a
      # mutable tag — same rationale as the Go API job above. Pinning the
      # worker jobs to a digest makes each release run an exact, reproducible
      # image instead of whatever :latest happens to resolve to at run time.
      - name: Resolve worker image digest
        id: resolve-image
        run: |
          ACR_SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_SERVER%.azurecr.io}"
          REPO="town-crier-worker-go"
          SHA="${{ steps.resolve.outputs.sha }}"

          digest_for_tag() {
            az acr repository show \
              --name "$ACR_NAME" \
              --image "${REPO}:$1" \
              --query digest -o tsv 2>/dev/null
          }

          # `|| true`: GitHub `run:` steps use `bash -e`, so a failed command
          # substitution aborts the step. Without it, a missing SHA-tagged image
          # (e.g. a tag whose commit didn't rebuild this image — an iOS-only or
          # CI-only merge) kills the job before the `latest` fallback can run.
          DIGEST="$(digest_for_tag "$SHA" || true)"
          if [ -n "$DIGEST" ]; then
            echo "Using exact image for SHA $SHA ($DIGEST)"
          else
            DIGEST="$(digest_for_tag latest || true)"
            if [ -n "$DIGEST" ]; then
              echo "No image for SHA $SHA — falling back to latest ($DIGEST)"
            else
              echo "::error::No worker image found (tried SHA $SHA and latest)"
              exit 1
            fi
          fi

          echo "image=${ACR_SERVER}/${REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/deploy-worker-jobs
        with:
          jobs: poll poll-bootstrap digest digest-hourly dormant-cleanup subscription-sweep pg-purge
          env-suffix: prod
          resource-group: ${{ needs.infra.outputs.resource-group }}
          image: ${{ steps.resolve-image.outputs.image }}

      # Durably tag the digest we just shipped as release-<version> inside the
      # same registry. The acr-build-push prune step protects any manifest
      # carrying a "release-*" tag, so this digest survives dev-build churn and
      # stays available for an ACA rollback-by-digest. `az acr import` with the
      # source and target in the same registry only adds a tag to the existing
      # manifest (no data movement); `--force` makes it idempotent on re-run.
      # Runs only after a successful deploy, so we protect digests that shipped.
      - name: Tag deployed worker digest as durable release
        run: |
          ACR_SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_SERVER%.azurecr.io}"
          REPO="town-crier-worker-go"
          az acr import \
            --name "$ACR_NAME" \
            --source "${{ steps.resolve-image.outputs.image }}" \
            --image "${REPO}:release-${GITHUB_REF_NAME}" \
            --force

  # ── Web ───────────────────────────────────────────────
  web:
    name: Deploy web
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v6

      # azure-login MUST run before build-web: in render-mode, build-web
      # downloads the weekly seo-snapshot.json from Azure Blob via `az storage
      # blob download --auth-mode login`, which needs the OIDC session.
      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # render-mode: build the SPA, download the weekly snapshot, render
      # /planning/* + sitemap.xml offline — zero Go API / Cosmos calls.
      # Fails loud if the snapshot blob is missing (no live-fetch fallback).
      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          seo-town-min-population: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}
          render-mode: 'true'
          storage-account-name: sttowncrierprod

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: ${{ needs.infra.outputs.swa-name }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
