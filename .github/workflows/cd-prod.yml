# Deploys all server-side components to the production environment.
# Triggered by pushing a semver tag (e.g., v1.0.0).
#
# Requires repo-level secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#   AUTO_GRANT_PRO_DOMAINS — Comma-separated email domains for automatic Pro tier
#
# Requires GitHub Environment:
#   production             — with OIDC federated credential (environment:production)

name: CD Production

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Infrastructure ────────────────────────────────────
  infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      resource-group: ${{ steps.outputs.outputs.resource-group }}
      swa-name: ${{ steps.outputs.outputs.swa-name }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pulumi up (prod)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          pulumi stack select prod
          pulumi config set --secret adminApiKey "${{ secrets.ADMIN_API_KEY }}"
          pulumi config set --secret autoGrantProDomains "${{ secrets.AUTO_GRANT_PRO_DOMAINS }}"
          pulumi up --yes --non-interactive

      - name: Extract Pulumi outputs
        id: outputs
        working-directory: infra
        run: |
          echo "resource-group=$(pulumi stack output resourceGroupName --stack prod)" >> "$GITHUB_OUTPUT"
          echo "swa-name=$(pulumi stack output staticWebAppName --stack prod)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── API ───────────────────────────────────────────────
  api:
    name: Deploy API
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag to commit SHA
        id: resolve
        run: echo "sha=$(git rev-parse "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve API image tag
        id: check-image
        run: |
          ACR_NAME="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_NAME%.azurecr.io}"
          SHA="${{ steps.resolve.outputs.sha }}"
          if az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-api:$SHA" 2>/dev/null; then
            echo "Using exact image for SHA $SHA"
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          elif az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-api:latest" 2>/dev/null; then
            echo "No image for SHA $SHA — falling back to latest"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No API image found (tried SHA $SHA and latest)"
            exit 1
          fi

      - name: Deploy API image to prod
        run: |
          az containerapp update \
            --name "ca-town-crier-api-prod" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ steps.check-image.outputs.tag }}"
        env:
          RESOURCE_GROUP: ${{ needs.infra.outputs.resource-group }}

  # ── Worker ───────────────────────────────────────────────
  worker:
    name: Deploy Worker
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag to commit SHA
        id: resolve
        run: echo "sha=$(git rev-parse "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve worker image tag
        id: check-image
        run: |
          ACR_NAME="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_NAME%.azurecr.io}"
          SHA="${{ steps.resolve.outputs.sha }}"
          if az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-worker:$SHA" 2>/dev/null; then
            echo "Using exact image for SHA $SHA"
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          elif az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-worker:latest" 2>/dev/null; then
            echo "No image for SHA $SHA — falling back to latest"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No worker image found (tried SHA $SHA and latest)"
            exit 1
          fi

      - name: Deploy worker image to prod
        run: |
          az containerapp job update \
            --name "job-town-crier-poll-prod" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:${{ steps.check-image.outputs.tag }}"
        env:
          RESOURCE_GROUP: ${{ needs.infra.outputs.resource-group }}

  # ── Web ───────────────────────────────────────────────
  web:
    name: Deploy web
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ vars.VITE_AUTH0_AUDIENCE }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          SWA_NAME: ${{ needs.infra.outputs.swa-name }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
