# Deploys all server-side components to the production environment.
# Triggered by pushing a semver tag (e.g., v1.0.0).
#
# Requires repo-level secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   PULUMI_ACCESS_TOKEN    — Pulumi Cloud access token
#   ADMIN_API_KEY          — API key for admin endpoints
#   AUTO_GRANT_PRO_DOMAINS — Comma-separated email domains for automatic Pro tier
#
# Requires GitHub Environment:
#   production             — with OIDC federated credential (environment:production)

name: CD Production

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Infrastructure ────────────────────────────────────
  infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      resource-group: ${{ steps.outputs.outputs.resource-group }}
      swa-name: ${{ steps.outputs.outputs.swa-name }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet-infra

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select Pulumi stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: pulumi stack select prod

      - name: Set Pulumi secrets
        uses: ./.github/actions/setup-pulumi-secrets
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        with:
          admin-api-key: ${{ secrets.ADMIN_API_KEY }}
          auto-grant-pro-domains: ${{ secrets.AUTO_GRANT_PRO_DOMAINS }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}

      - name: Pulumi up (prod)
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: pulumi up --yes --non-interactive

      - name: Extract Pulumi outputs
        id: outputs
        working-directory: infra
        run: |
          echo "resource-group=$(pulumi stack output resourceGroupName --stack prod)" >> "$GITHUB_OUTPUT"
          echo "swa-name=$(pulumi stack output staticWebAppName --stack prod)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── API ───────────────────────────────────────────────
  api:
    name: Deploy API
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag to commit SHA
        id: resolve
        run: echo "sha=$(git rev-parse "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve API image tag
        id: check-image
        run: |
          ACR_NAME="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_NAME%.azurecr.io}"
          SHA="${{ steps.resolve.outputs.sha }}"
          if az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-api:$SHA" 2>/dev/null; then
            echo "Using exact image for SHA $SHA"
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          elif az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-api:latest" 2>/dev/null; then
            echo "No image for SHA $SHA — falling back to latest"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No API image found (tried SHA $SHA and latest)"
            exit 1
          fi

      - uses: ./.github/actions/deploy-container-app
        with:
          app-name: ca-town-crier-api-prod
          resource-group: ${{ needs.infra.outputs.resource-group }}
          image: ${{ secrets.ACR_LOGIN_SERVER }}/town-crier-api:${{ steps.check-image.outputs.tag }}

  # ── Worker ───────────────────────────────────────────────
  worker:
    name: Deploy Worker
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag to commit SHA
        id: resolve
        run: echo "sha=$(git rev-parse "$GITHUB_REF_NAME")" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve worker image tag
        id: check-image
        run: |
          ACR_NAME="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${ACR_NAME%.azurecr.io}"
          SHA="${{ steps.resolve.outputs.sha }}"
          if az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-worker:$SHA" 2>/dev/null; then
            echo "Using exact image for SHA $SHA"
            echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          elif az acr manifest show \
            --registry "$ACR_NAME" \
            --name "town-crier-worker:latest" 2>/dev/null; then
            echo "No image for SHA $SHA — falling back to latest"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No worker image found (tried SHA $SHA and latest)"
            exit 1
          fi

      - uses: ./.github/actions/deploy-worker-jobs
        with:
          env-suffix: prod
          resource-group: ${{ needs.infra.outputs.resource-group }}
          image: ${{ secrets.ACR_LOGIN_SERVER }}/town-crier-worker:${{ steps.check-image.outputs.tag }}

  # ── Web ───────────────────────────────────────────────
  web:
    name: Deploy web
    needs: infra
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: ${{ needs.infra.outputs.swa-name }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true
