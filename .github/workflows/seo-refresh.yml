# Daily refresh of the SEO snapshot for BOTH dev and prod web.
#
# Third-party actions pinned to commit SHA for supply-chain safety
# (tj-actions CVE-2025-30066 rationale — issue #835 slice 4).
#
# This job is the SOLE caller of the gated Go API for the programmatic SEO pages
# (authority-level AND per-town), plus sitemap.xml (epic tc-w5w9 / GH #598). It
# decouples *data fetching* (daily, against the API) from *page rendering*
# (every build, offline) so that normal CD releases (cd-dev on push, cd-prod on
# tag) make ZERO Go API / Cosmos calls. The per-build render reads the snapshot
# this job produces.
#
# Per environment, each job runs the following flow:
#   1. Build the SPA only (build-web with an EMPTY site-build-key, so the
#      build-time prerender step skips — produces an SPA-only web/dist).
#   2. Azure OIDC login.
#   3. FETCH: `prerender-planning.mjs --fetch` calls the gated Go API for all
#      authorities + population-eligible towns and writes web/seo-snapshot.json.
#      This is the ONLY Go API call in the whole pipeline.
#   4. UPLOAD: push seo-snapshot.json to the environment's Azure Blob container
#      (seo-snapshot/seo-snapshot.json). The storage account has shared-key
#      access DISABLED, so blob I/O uses `--auth-mode login` (AAD/RBAC); the CI
#      OIDC identity holds Storage Blob Data Contributor.
#   5. RENDER: `prerender-planning.mjs --render` reads seo-snapshot.json and
#      writes /planning/* + sitemap.xml into web/dist with ZERO network calls.
#   6. DEPLOY: full-replace SWA upload of web/dist.
#
# Cadence is a DAILY FULL rebuild — every run fetches the complete authority AND
# town set, emits one combined sitemap, and ships it as a full-replace SWA deploy
# (owner decision, GH #585, tc-2avw.6; moved from weekly to daily, tc-df4z — the
# Cosmos->Postgres migration made the per-run API/cost footprint negligible, see
# ADR 0031 amendments and ADR 0032). Building everything together every run
# keeps the sitemap ≡ the live page set by construction. The snapshot it writes
# is then re-used (rendered offline) by every CD release until the next daily
# run, so page data is at most ~1 day stale — comfortably fresh for SEO pages.
#
# Deploying prod on a schedule is a deliberate exception to the tag-triggered
# prod convention (see GH #570, tc-nnte.6), accepted so prod SEO pages stay fresh.
#
# Requires secrets:
#   AZURE_CLIENT_ID        — OIDC federated credential for Azure login
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Azure subscription
#   SITE_BUILD_KEY         — build-key that gates the recent-applications API used by --fetch
#   GITHUB_TOKEN           — provided automatically; used by static-web-apps-deploy
#
# Requires per-environment GitHub variables (vars.*):
#   VITE_API_BASE_URL, VITE_AUTH0_DOMAIN, VITE_AUTH0_CLIENT_ID,
#   VITE_AUTH0_AUDIENCE, VITE_APPLICATIONINSIGHTS_CONNECTION_STRING,
#   SEO_TOWN_MIN_POPULATION (optional; defaults to 5000)
#
# Requires GitHub Environments:
#   development, production  — each with an OIDC federated credential. The
#   `environment:` block on each job selects that environment's vars.* values
#   (dev → api-dev, prod → api).
#
# Requires .github/config/resource-names.env — single source of truth for
# hardcoded Azure resource names (SWA, storage account). Loaded per-job via
# `cat ... >> "$GITHUB_ENV"` after checkout; asserted against
# infra/environment.go's naming conventions by an /infra Go test (issue #835
# slice 6).

name: SEO Refresh

on:
  schedule:
    # 10:10 UTC daily = 11:10 UK local (BST in summer). Chosen so the day's new
    # planning applications (usually in by 11am UK time) have landed, with a bit
    # of wiggle room, before the refresh runs — afternoon SEO page visitors see
    # same-day data. Like the other time-of-day crons in this repo (digest,
    # dormant-cleanup, pg-purge in infra/environment.go), this is a fixed UTC
    # time with no DST adjustment: it drifts to 10:10 UK local over GMT months.
    - cron: '10 10 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: "Manual runs only: which environment(s) to refresh. The daily schedule always refreshes both."
        type: choice
        default: both
        options:
          - both
          - dev
          - prod

concurrency:
  group: seo-refresh
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ── Web: daily full refresh dev ─────────────────────────
  web-dev:
    name: "Web: Daily refresh dev"
    # Schedule always runs; manual runs honour the `environment` selector.
    if: github.event_name == 'schedule' || inputs.environment == 'dev' || inputs.environment == 'both'
    runs-on: ubuntu-latest
    # 30 min: --fetch gathers the complete authority + town set serially (~410
    # authorities + several hundred towns, two bounded Cosmos reads each), so this
    # is the long pole; the offline --render is fast.
    timeout-minutes: 30
    environment: development
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} (or, in `run:` steps,
      # the plain shell var) instead of inline literals. Must run after
      # checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      # SPA only — empty site-build-key skips the build-time prerender.
      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          site-build-key: ""
          seo-town-min-population: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The ONLY Go API call in the pipeline: write web/seo-snapshot.json.
      - name: Fetch SEO snapshot from the API
        working-directory: web
        run: node scripts/prerender-planning.mjs --fetch
        env:
          SITE_BUILD_KEY: ${{ secrets.SITE_BUILD_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          SEO_TOWN_MIN_POPULATION: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}

      # Shared-key access is disabled on the account, so --auth-mode login (AAD).
      - name: Upload snapshot to Azure Blob
        run: |
          az storage blob upload \
            --auth-mode login \
            --account-name "${STORAGE_ACCOUNT_DEV}" \
            --container-name seo-snapshot \
            --name seo-snapshot.json \
            --file web/seo-snapshot.json \
            --overwrite

      # Offline render of /planning/* + sitemap.xml into web/dist (zero network).
      - name: Render SEO pages from the snapshot
        working-directory: web
        run: node scripts/prerender-planning.mjs --render

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: ${{ env.SWA_NAME_DEV }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true

  # ── Web: daily full refresh prod ────────────────────────
  # No infra job here, so swa-name and the storage account name come from
  # .github/config/resource-names.env (cd-prod reads these from Pulumi
  # outputs instead; this data-only refresh has no Pulumi step). The env file
  # is asserted against infra/environment.go's naming conventions by an
  # /infra Go test (issue #835 slice 6).
  web-prod:
    name: "Web: Daily refresh prod"
    # Schedule always runs; manual runs honour the `environment` selector.
    if: github.event_name == 'schedule' || inputs.environment == 'prod' || inputs.environment == 'both'
    runs-on: ubuntu-latest
    # 30 min: full authority + town --fetch (see web-dev for the rationale).
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Loads the resource-name constants (issue #835 slice 6) into $GITHUB_ENV
      # so subsequent steps can reference ${{ env.KEY }} (or, in `run:` steps,
      # the plain shell var) instead of inline literals. Must run after
      # checkout — the file has to be on disk.
      - name: Load resource names
        run: cat .github/config/resource-names.env >> "$GITHUB_ENV"

      # Snapshot the currently-live sitemap BEFORE the deploy below replaces it.
      # The IndexNow step diffs the freshly built sitemap against this to submit
      # only new/changed URLs (IndexNow spec: submit URLs whose content changed;
      # engines deprioritise keys that resubmit identical full-site lists).
      # Failure to capture is non-fatal: the IndexNow step then falls back to
      # submitting the full list, which is the pre-existing behaviour.
      - name: Capture live sitemap for IndexNow diff
        run: |
          curl -fsS --max-time 30 https://towncrierapp.uk/sitemap.xml -o "$RUNNER_TEMP/live-sitemap.xml" \
            || echo "Could not capture live sitemap; IndexNow will fall back to submitting all URLs."

      # SPA only — empty site-build-key skips the build-time prerender.
      - uses: ./.github/actions/build-web
        with:
          vite-api-base-url: ${{ vars.VITE_API_BASE_URL }}
          vite-auth0-domain: ${{ vars.VITE_AUTH0_DOMAIN }}
          vite-auth0-client-id: ${{ vars.VITE_AUTH0_CLIENT_ID }}
          vite-auth0-audience: ${{ vars.VITE_AUTH0_AUDIENCE }}
          vite-applicationinsights-connection-string: ${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          site-build-key: ""
          seo-town-min-population: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}

      - uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The ONLY Go API call in the pipeline: write web/seo-snapshot.json.
      - name: Fetch SEO snapshot from the API
        working-directory: web
        run: node scripts/prerender-planning.mjs --fetch
        env:
          SITE_BUILD_KEY: ${{ secrets.SITE_BUILD_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          SEO_TOWN_MIN_POPULATION: ${{ vars.SEO_TOWN_MIN_POPULATION || '5000' }}

      # Shared-key access is disabled on the account, so --auth-mode login (AAD).
      - name: Upload snapshot to Azure Blob
        run: |
          az storage blob upload \
            --auth-mode login \
            --account-name "${STORAGE_ACCOUNT_PROD}" \
            --container-name seo-snapshot \
            --name seo-snapshot.json \
            --file web/seo-snapshot.json \
            --overwrite

      # Offline render of /planning/* + sitemap.xml into web/dist (zero network).
      - name: Render SEO pages from the snapshot
        working-directory: web
        run: node scripts/prerender-planning.mjs --render

      - name: Get SWA deployment token
        id: swa-token
        uses: ./.github/actions/get-swa-token
        with:
          swa-name: ${{ env.SWA_NAME_PROD }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true
          skip_api_build: true

      # Notify Bing (IndexNow) of NEW/CHANGED live URLs only (IndexNow spec:
      # submit URLs whose content changed — resubmitting the full site daily
      # risks the key being deprioritised). Diffs the freshly-rendered sitemap
      # above against the live sitemap captured by "Capture live sitemap for
      # IndexNow diff" (taken before the SWA deploy replaced it): a URL is
      # submitted if it's new or its <lastmod> changed (the sitemap generator
      # only bumps <lastmod> on a content change). Deleted URLs are out of
      # scope. If there's nothing to diff against (capture failed, or the live
      # sitemap was missing/empty), falls back to submitting the full list —
      # the pre-existing behaviour.
      #
      # Bing's IndexNow verifier fetches the key file from the CDN edge to
      # confirm ownership. The SWA upload above redeploys that file, and for a
      # short window afterwards the edge can serve the SPA fallback / a cold
      # cache for the key URL, so verification returns 403
      # SiteVerificationNotCompleted and the whole batch is rejected. We
      # therefore (1) wait until the edge serves the correct key contents, then
      # (2) submit with retry-on-403 backoff — but only when there's something
      # to submit. A persistent 403 means the URLs were NOT accepted, so it
      # fails the step — it must never be silently swallowed again (that
      # masked a total IndexNow outage for weeks).
      - name: Submit sitemap URLs to IndexNow
        env:
          INDEXNOW_KEY: 1cb201daee1a485fb8cce2a68e8ee465
        run: |
          set -uo pipefail
          key_url="https://towncrierapp.uk/${INDEXNOW_KEY}.txt"
          live_sitemap="$RUNNER_TEMP/live-sitemap.xml"
          new_pairs_file="$RUNNER_TEMP/new-sitemap-pairs.tsv"
          old_pairs_file="$RUNNER_TEMP/old-sitemap-pairs.tsv"

          # Extract (loc, lastmod) tab-separated pairs from a sitemap.xml. A
          # missing <lastmod> prints an empty mod field, which still compares
          # correctly (changed/unchanged) by plain string equality below.
          pairs() {
            awk -F'[<>]' '
              /<loc>/     { loc=$3 }
              /<lastmod>/ { mod=$3 }
              /<\/url>/   { if (loc != "") print loc "\t" mod; loc=""; mod="" }
            ' "$1"
          }

          pairs web/dist/sitemap.xml > "$new_pairs_file" || true
          new_count=$(wc -l < "$new_pairs_file" | tr -d ' ')
          if [ "$new_count" -lt 1 ]; then
            echo "No URLs parsed from web/dist/sitemap.xml — failing."
            exit 1
          fi

          if [ -f "$live_sitemap" ]; then
            pairs "$live_sitemap" > "$old_pairs_file" || true
          else
            : > "$old_pairs_file"
          fi
          old_count=$(wc -l < "$old_pairs_file" | tr -d ' ')

          # Explicit "no usable old pairs" branch — deliberately NOT relying on
          # awk's NR==FNR to separate old/new when the old file could be empty
          # (NR==FNR would stay true reading the second file too, and every URL
          # would be silently treated as "old").
          if [ "$old_count" -lt 1 ]; then
            echo "No live sitemap to diff against — submitting all $new_count URLs."
            changed=$(cut -f1 "$new_pairs_file")
          else
            changed=$(awk -F'\t' '
              FILENAME == ARGV[1] { old[$1] = $2; next }
              !($1 in old) || old[$1] != $2 { print $1 }
            ' "$old_pairs_file" "$new_pairs_file")
          fi

          changed_count=$(echo "$changed" | grep -c . || true)
          if [ "$changed_count" -lt 1 ]; then
            echo "No new or changed URLs since the last deploy — skipping IndexNow submission."
            exit 0
          fi

          # 1. Wait for the freshly-deployed key file to be served at the edge
          #    with the exact key contents (not the SPA fallback). Up to ~3 min.
          for attempt in $(seq 1 12); do
            body=$(curl -fsS "$key_url" 2>/dev/null || true)
            if [ "$body" = "$INDEXNOW_KEY" ]; then
              echo "Key file live at edge (attempt $attempt)."
              break
            fi
            echo "Key file not settled yet (attempt $attempt); waiting 15s..."
            sleep 15
          done
          # Extra margin: Bing's verifier fetches the key file independently of
          # the check above and may still be hitting a colder edge.
          sleep 30

          # 2. Build the payload from only the changed URLs and submit,
          #    retrying on 403 with backoff.
          urls=$(echo "$changed" | jq -R '.' | jq -s '.' || true)
          payload=$(jq -n \
            --arg host "towncrierapp.uk" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "$key_url" \
            --argjson urlList "$urls" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting $changed_count changed URLs (of $new_count total) to IndexNow..."
          for attempt in $(seq 1 6); do
            http_code=$(curl -s -o /tmp/indexnow-response.txt -w "%{http_code}" \
              -X POST "https://api.indexnow.org/IndexNow" \
              -H "Content-Type: application/json; charset=utf-8" \
              --data "$payload")
            echo "Attempt $attempt: IndexNow response $http_code — $(cat /tmp/indexnow-response.txt)"
            case "$http_code" in
              200|202)
                echo "IndexNow accepted $changed_count URLs."
                exit 0
                ;;
              403)
                echo "Verification not complete yet; retrying in 30s..."
                sleep 30
                ;;
              *)
                echo "IndexNow hard error $http_code — failing."
                exit 1
                ;;
            esac
          done
          echo "IndexNow still returning 403 after retries — submissions were NOT accepted."
          exit 1
