# Third-party actions pinned to commit SHA for supply-chain safety
# (tj-actions CVE-2025-30066 rationale — issue #835 slice 4, repo policy #843).

name: Design token drift check

on:
  pull_request:
    branches: [main]
    paths:
      - 'design/**'
      - 'scripts/design-tokens/**'
      - 'scripts/check-design-token-drift.sh'
      - 'web/src/styles/tokens.css'
      - 'web/scripts/lib/tokens.generated.mjs'
      - 'api-go/internal/designtokens/tokens_gen.go'
      - 'api-go/internal/sharepage/templates/tokens.gohtml'
      - 'mobile/ios/packages/town-crier-presentation/Sources/DesignSystem/Colors/Color+TownCrier.swift'
      - 'mobile/android/presentation/src/main/kotlin/uk/towncrierapp/presentation/designsystem/Color.kt'
      - '.claude/skills/design-language/references/tokens.md'
      # Android launcher-icon foregrounds + their master source (issue #860, R7).
      - 'mobile/ios/town-crier-app/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png'
      - 'mobile/android/app/src/main/res/mipmap-**'
      - '.github/workflows/design-token-drift-check.yml'

permissions:
  contents: read

jobs:
  check:
    name: Verify generated design tokens match design/tokens.json
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: bash scripts/check-design-token-drift.sh
      - run: node --test scripts/design-tokens/*.test.mjs
