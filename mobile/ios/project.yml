name: TownCrier
options:
  bundleIdPrefix: uk.towncrierapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  createIntermediateGroups: true

packages:
  TownCrier:
    path: .

targets:
  TownCrierApp:
    type: application
    platform: iOS
    sources:
      - path: town-crier-app/Sources
      - path: town-crier-app/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.towncrierapp.mobile
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Town Crier"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: town-crier-app/TownCrierApp.entitlements
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
    urlTypes:
      - schemes:
          - uk.towncrierapp.mobile
    dependencies:
      - package: TownCrier
        product: TownCrierDomain
      - package: TownCrier
        product: TownCrierData
      - package: TownCrier
        product: TownCrierPresentation

schemes:
  TownCrierApp:
    build:
      targets:
        TownCrierApp: all
    run:
      config: Debug
      simulateLocation: false
    profile:
      config: Release
    analyze:
      config: Debug
