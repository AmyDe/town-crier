# Local Postgres + PostGIS for real-database integration tests.
#
# This stands up the throwaway database the `integration`-tagged tests run
# against. It is NOT a production or deployment artifact — Cosmos remains the
# live datastore. See docs/memo/0010 for the migration rationale.
#
#   docker compose -f docker-compose.yml up -d --wait   # boot, wait for healthy
#   TEST_DATABASE_URL=postgres://towncrier:towncrier@localhost:5433/towncrier_test?sslmode=disable \
#     go test -tags=integration ./...
#   docker compose -f docker-compose.yml down -v          # tear down + drop volume
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: towncrier
      POSTGRES_PASSWORD: towncrier
      POSTGRES_DB: towncrier_test
    ports:
      # Host 5433 avoids clashing with a local Postgres on the default 5432.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U towncrier -d towncrier_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
